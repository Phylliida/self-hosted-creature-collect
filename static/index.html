<style>

    position: absolute; inset: 0; z-index: 23;

    background: rgba(0,0,0,0.3);

    background: #fff; width: 100%; max-width: 480px;

<script>
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent)
  || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
const isStandalone = window.navigator.standalone
  || window.matchMedia('(display-mode: standalone)').matches;
if (isIOS && !isStandalone && localStorage.getItem('cc.installDismissed') !== '1') {
  document.getElementById('install').classList.add('show');
}
document.getElementById('installDismiss').onclick = () => {
  localStorage.setItem('cc.installDismissed', '1');
  document.getElementById('install').classList.remove('show');
};

async function updateStorageInfo() {
  const el = document.getElementById('storage');
  if (!el || !navigator.storage) return;
  const parts = [];
  if (navigator.storage.persisted) {
    parts.push((await navigator.storage.persisted()) ? 'persistent ✓' : 'not persistent');
  }
  if (navigator.storage.estimate) {
    const { usage = 0, quota = 0 } = await navigator.storage.estimate();
    const mb = (n) => (n / 1048576).toFixed(1) + 'MB';
    parts.push(`${mb(usage)} / ${mb(quota)}`);
  }
  el.textContent = parts.join(' · ');
}

async function requestPersistent() {
  if (navigator.storage && navigator.storage.persist) {
    try { await navigator.storage.persist(); } catch {}
  }
  updateStorageInfo();
}
requestPersistent();

const POI_DB_NAME = 'cc.pois.v1';
function openPoiDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(POI_DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains('pois')) {
        const store = db.createObjectStore('pois', { autoIncrement: true });
        store.createIndex('regionId', 'regionId');
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function savePois(regionId, pois) {
  if (!pois.length) return;
  const db = await openPoiDB();
  const tx = db.transaction('pois', 'readwrite');
  const store = tx.objectStore('pois');
  for (const p of pois) store.put({ ...p, regionId });
  await new Promise((r, j) => { tx.oncomplete = r; tx.onerror = () => j(tx.error); });
  db.close();
}
async function loadAllPois() {
  const db = await openPoiDB();
  return new Promise((resolve, reject) => {
    const req = db.transaction('pois', 'readonly').objectStore('pois').getAll();
    req.onsuccess = () => { resolve(req.result); db.close(); };
    req.onerror = () => reject(req.error);
  });
}
async function deletePoisByRegion(regionId) {
  const db = await openPoiDB();
  const tx = db.transaction('pois', 'readwrite');
  const idx = tx.objectStore('pois').index('regionId');
  const req = idx.openCursor(IDBKeyRange.only(regionId));
  await new Promise((res, rej) => {
    req.onsuccess = (e) => { const c = e.target.result; if (c) { c.delete(); c.continue(); } else res(); };
    req.onerror = () => rej(req.error);
  });
  db.close();
}

const ROUTES_DB_NAME = 'cc.routes.v2';
function openRoutesDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(ROUTES_DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains('routes')) {
        db.createObjectStore('routes', { keyPath: 'regionId' });
      }
      if (!db.objectStoreNames.contains('meta')) {
        db.createObjectStore('meta', { keyPath: 'rid' });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function saveRoutes(regionId, features, metaMap, stopsMap) {
  const db = await openRoutesDB();
  const tx = db.transaction(['routes', 'meta'], 'readwrite');
  tx.objectStore('routes').put({ regionId, features });
  const metaStore = tx.objectStore('meta');
  if (metaMap) {
    for (const [rid, meta] of Object.entries(metaMap)) {
      const stops = (stopsMap && stopsMap[rid]) || [];
      metaStore.put({ rid, ...meta, stops });
    }
  }
  await new Promise((r, j) => { tx.oncomplete = r; tx.onerror = () => j(tx.error); });
  db.close();
}

function openFavoritesDB() {

function lonLatToTile(lon, lat, z) {
  const n = 2 ** z;
  const x = Math.floor((lon + 180) / 360 * n);
  const latRad = lat * Math.PI / 180;
  const y = Math.floor((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n);
  return [Math.max(0, Math.min(n - 1, x)), Math.max(0, Math.min(n - 1, y))];
}

function estimateTiles(bbox, minZoom, maxZoom) {
  const [w, s, e, n] = bbox;
  let count = 0;
  for (let z = minZoom; z <= maxZoom; z++) {
    const [xMin, yMin] = lonLatToTile(w, n, z);
    const [xMax, yMax] = lonLatToTile(e, s, z);
    count += (Math.abs(xMax - xMin) + 1) * (Math.abs(yMax - yMin) + 1);
  }
  return count;
}

  function renderTransitModes() {
    const el = document.getElementById('transitModes');
    el.innerHTML = currentTransitModes().map(m =>
      `<span class="mode-chip${modeOn(m) ? ' on' : ''}" data-mode="${m}">${TRANSIT_MODE_LABELS[m] || m}</span>`
    ).join('');
    el.querySelectorAll('[data-mode]').forEach(chip => {
      chip.onclick = async () => {
        const m = chip.dataset.mode;
        const nowOn = !modeOn(m);
        transitState.modes[m] = nowOn;
        for (const [rid, meta] of Object.entries(routeMetaIndex)) {
          if (meta.mode === m) transitState.routes[rid] = nowOn;
        }
        saveTransitState(transitState);
        renderTransitModes();
        renderTransitRoutes();
        await refreshRoutesSource();
      };
    });

  function renderTransitRoutes() {
    const el = document.getElementById('transitRoutes');
    const q = (document.getElementById('transitSearch').value || '').trim().toLowerCase();
    const activeOnly = document.getElementById('transitActiveOnly').checked;
    const rows = Object.entries(routeMetaIndex)
      .filter(([rid, m]) => {
        if (activeOnly && !routeOn(rid)) return false;
        if (!q) return true;
        return (m.ref || '').toLowerCase().includes(q)
          || (m.name || '').toLowerCase().includes(q);
      })
      .sort(([_, a], [__, b]) => {
        if (a.mode !== b.mode) return a.mode.localeCompare(b.mode);
        const ra = parseInt(a.ref) || 99999, rb = parseInt(b.ref) || 99999;
        if (ra !== rb) return ra - rb;
        return (a.ref || '').localeCompare(b.ref || '');
      });
    document.getElementById('transitCount').textContent = `${rows.length} route${rows.length === 1 ? '' : 's'}`;
    if (!rows.length) {
      el.innerHTML = '<div style="font-size:12px; color:#888; padding:8px;">No routes — save a region first to download them.</div>';
      return;
    }
    el.innerHTML = rows.map(([rid, m]) => {
      const colour = /^#[0-9a-f]{3,8}$/i.test(m.colour || '') ? m.colour : '#888';
      const on = routeOn(rid);
      return `<label class="route-row">
        <input type="checkbox" data-rid="${esc(rid)}" ${on ? 'checked' : ''}>
        <span class="ref" style="background:${esc(colour)}">${esc(m.ref || '?')}</span>
        <span class="name">${esc(m.name || '(unnamed)')}</span>
        <span class="mode-tag">${esc(m.mode)}</span>
      </label>`;
    }).join('');
    el.querySelectorAll('[data-rid]').forEach(cb => {
      cb.onchange = async () => {
        const rid = cb.dataset.rid;
        transitState.routes[rid] = cb.checked;
        if (cb.checked) {
          const meta = routeMetaIndex[rid];
          if (meta && !modeOn(meta.mode)) {
            transitState.modes[meta.mode] = true;
            renderTransitModes();
            applyTransitTileVisibility();
          }
        }
        saveTransitState(transitState);
        await refreshRoutesSource();
      };
    });
  }

  async function svgToImageData(svgText, size = 24, dpr = 2) {
    const blob = new Blob([svgText], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    try {
      const img = new Image();
      img.src = url;
      await img.decode();
      const canvas = document.createElement('canvas');
      canvas.width = size * dpr;
      canvas.height = size * dpr;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, size * dpr, size * dpr);
      return { data: ctx.getImageData(0, 0, size * dpr, size * dpr), pixelRatio: dpr };
    } finally {
      URL.revokeObjectURL(url);
    }
  }

  const registeredIconNames = new Set();
  async function registerIconFromSvg(name, svgText) {
    if (map.hasImage(name)) return true;
    try {
      const { data, pixelRatio } = await svgToImageData(svgText, 24, 2);
      map.addImage(name, data, { pixelRatio, sdf: true });
      registeredIconNames.add(name);
      if (name.includes('-')) {
        const us = name.replace(/-/g, '_');
        if (!map.hasImage(us)) { map.addImage(us, data, { pixelRatio, sdf: true }); registeredIconNames.add(us); }
      }
      const aliases = ICON_ALIAS_MAP[name];
      if (aliases) {
        for (const a of aliases) {
          if (!map.hasImage(a)) { map.addImage(a, data, { pixelRatio, sdf: true }); registeredIconNames.add(a); }
        }
      }
      return true;
    } catch { return false; }
  }

  async function loadIcon(name, opts = {}) {
    if (map.hasImage(name)) return true;
    try {
      const headers = opts.download ? { 'X-Download': '1' } : {};
      const res = await fetch(`/icons/${encodeURIComponent(name)}.svg`, { headers });
      if (!res.ok || res.status === 204) return false;
      const svg = await res.text();
      if (!svg) return false;
      return registerIconFromSvg(name, svg);
    } catch { return false; }
  }

  async function exportData() {
    const data = {
      version: 1,
      exportedAt: new Date().toISOString(),
      favorites: await loadAllFavorites(),
      regions: JSON.parse(localStorage.getItem('cc.regions.v1') || '[]'),
      theme: localStorage.getItem('cc.theme'),
      themeCustom: JSON.parse(localStorage.getItem('cc.themeCustom') || 'null'),
      units: localStorage.getItem('cc.units'),
      view: JSON.parse(localStorage.getItem('cc.view.v1') || 'null'),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().slice(0, 16).replace(/[:T]/g, '-');
    a.href = url;
    a.download = `creature-collect-${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);

  async function importData(file) {
    const text = await file.text();
    const data = JSON.parse(text);
    let favAdded = 0, favSkipped = 0, regAdded = 0;
    if (Array.isArray(data.favorites)) {
      const existing = new Set(favorites.map(f => f.id));
      for (const fav of data.favorites) {
        if (!fav || !fav.id) continue;
        if (existing.has(fav.id)) { favSkipped++; continue; }
        await saveFavorite(fav);
        favAdded++;
      }
      favorites = await loadAllFavorites();
      renderAllFavorites();
    }
    if (Array.isArray(data.regions)) {
      const existing = JSON.parse(localStorage.getItem('cc.regions.v1') || '[]');
      const existingIds = new Set(existing.map(r => r.id));
      const toAdd = data.regions.filter(r => r && r.id && !existingIds.has(r.id));
      if (toAdd.length) {
        localStorage.setItem('cc.regions.v1', JSON.stringify(existing.concat(toAdd)));
        regAdded = toAdd.length;
        renderRegions();
        updateAppDataLabel();
      }
    }
    if (data.themeCustom && !localStorage.getItem('cc.themeCustom')) {
      localStorage.setItem('cc.themeCustom', JSON.stringify(data.themeCustom));
      syncCustomInputs(loadCustomTheme());
    }
    if (data.theme && !localStorage.getItem('cc.theme')) {
      localStorage.setItem('cc.theme', data.theme);
      themeSelect.value = data.theme;
      updateCustomVisibility();
      applyTheme(data.theme);
    }
    if (data.units && !localStorage.getItem('cc.units')) {
      localStorage.setItem('cc.units', data.units);
      unitsSelect.value = data.units;
      scaleCtrl.setUnit(data.units === 'mi' ? 'imperial' : 'metric');
    }
    alert(`Imported: ${favAdded} favorite(s) (${favSkipped} skipped as duplicate), ${regAdded} region(s)`);
  }

  function haversineKm(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const toRad = (d) => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat / 2) ** 2
      + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(a));
  }
  function fmtDist(km) {
    if (localStorage.getItem('cc.units') === 'mi') {
      const mi = km * 0.621371;
      if (mi < 0.1) return `${Math.round(mi * 5280)} ft`;
      if (mi < 10) return `${mi.toFixed(1)} mi`;
      return `${Math.round(mi)} mi`;
    }
    if (km < 1) return `${Math.round(km * 1000)} m`;
    if (km < 10) return `${km.toFixed(1)} km`;
    return `${Math.round(km)} km`;
  }

  const esc = (s) => String(s).replace(/[&<>"']/g,
    c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  const humanize = (s) => String(s || '').replace(/_/g, ' ')
    .replace(/\b\w/g, c => c.toUpperCase());

  const CATEGORY_TO_ICON_FILE = (() => {
    const m = {};
    for (const [file, aliases] of Object.entries(ICON_ALIAS_MAP)) {
      for (const a of aliases) m[a] = file;
    }
    return m;
  })();
  function iconFileFor(cat) {
    if (!cat) return 'marker';
    if (CATEGORY_TO_ICON_FILE[cat]) return CATEGORY_TO_ICON_FILE[cat];
    if (cat.includes('_')) return cat.replace(/_/g, '-');
    return cat;
  }

    return null;
  }

    if (p.description) rows.push(`<div class="row"><span class="lbl">💬</span><span class="val">${esc(p.description)}</span></div>`);

        rows.push(`<div class="row"><span class="lbl">📚</span><span class="val"><a href="${esc(url)}" target="_blank" rel="noopener">Wikipedia: ${esc(article)}</a></span></div>`);

    // If this POI is a transit stop/station/platform and we know its schedule,
    // append a "lines at this stop" list. Each row opens the full schedule

    const TRANSIT_POI_CATS = new Set([
      'stop_position', 'platform', 'station', 'bus_stop',
      'tram_stop', 'halt', 'subway_entrance', 'ferry_terminal',

    if (TRANSIT_POI_CATS.has(poi.category) && scheduleIdx.stops?.size) {
      const nearby = findStopsNear(poi.lng, poi.lat, 40);
      const nodeIds = [...new Set(nearby.map(s => s.node_id).filter(x => x != null))];
      const groups = nodeIds.length ? nextDeparturesForOsmNodes(nodeIds, new Date()) : [];
      if (groups.length) {

          </div>`;
        }).join('');
        rows.push(`<div class="route-popup"><div class="dep-section">

      if (!el.dataset.pattern) return;
      el.onclick = () => {

          el.dataset.pattern, el.dataset.stop, +el.dataset.seq,

  const FAV_ICON_FALLBACK = ['star', 'heart', 'marker', 'camera', 'restaurant',

  function favIconSet() {
    return availableIconNames.length ? availableIconNames : FAV_ICON_FALLBACK;

  const FAV_COLORS = ['#e53935', '#fb8c00', '#fdd835', '#43a047',
                      '#1e88e5', '#8e24aa', '#e91e63', '#546e7a'];

  function favIdFor(lng, lat) { return `${lng.toFixed(6)}|${lat.toFixed(6)}`; }
  let favorites = [];
  let favMarkers = {};

  function findFavorite(lng, lat) {
    const id = favIdFor(lng, lat);

  const POI_SIZE_STOPS = [[11, 0.08], [14, 0.2], [16, 0.4], [18, 0.75], [20, 1.0]];
  const POI_BASE_PX = 24;
  const FAV_SCALE = 1.0;

  function interpExp(zoom, stops, base) {
    if (zoom <= stops[0][0]) return stops[0][1];
    if (zoom >= stops[stops.length - 1][0]) return stops[stops.length - 1][1];
    for (let i = 0; i < stops.length - 1; i++) {
      if (zoom >= stops[i][0] && zoom <= stops[i + 1][0]) {
        const [z1, s1] = stops[i], [z2, s2] = stops[i + 1];
        const factor = (Math.pow(base, zoom - z1) - 1) / (Math.pow(base, z2 - z1) - 1);
        return s1 + (s2 - s1) * factor;
      }
    }
    return stops[0][1];
  }
  function favBubbleSize(zoom) {
    return POI_BASE_PX * interpExp(zoom, POI_SIZE_STOPS, 1.5) * FAV_SCALE;
  }

  function applyFavSize(el, size) {
    el.style.width = `${size}px`;
    el.style.height = `${size}px`;
    const border = Math.max(1, Math.round(size * 0.07));
    el.style.borderWidth = `${border}px`;
    const img = el.querySelector('img');
    if (img) {
      const iconSize = size * 0.64;
      img.style.width = `${iconSize}px`;
      img.style.height = `${iconSize}px`;
    }
  }

  function makeFavoriteMarker(fav) {
    const el = document.createElement('div');
    el.className = 'favorite-marker';
    el.style.background = fav.color;
    el.innerHTML = `<img src="/icons/${encodeURIComponent(fav.icon)}.svg">`
      + (fav.name ? `<div class="fav-label">${esc(fav.name)}</div>` : '');
    applyFavSize(el, favBubbleSize(map.getZoom()));
    el.onclick = (e) => {
      e.stopPropagation();
      const full = findFullPoi(fav.lng, fav.lat, fav.name);
      const poi = full || { lng: fav.lng, lat: fav.lat, name: fav.name, category: fav.category, props: {} };
      setSelected(poi);
    };
    return new maplibregl.Marker({ element: el, anchor: 'center' })
      .setLngLat([fav.lng, fav.lat])
      .addTo(map);
  }

  function updateFavPoiFilter() {
    const names = favorites.map(f => f.name).filter(Boolean);
    const filter = names.length
      ? ['!', ['in', ['coalesce', ['get', 'name:latin'], ['get', 'name'], ''], ['literal', names]]]
      : null;

    try { map.setFilter('poi-labels', filter); } catch {}
  }

  function renderAllFavorites() {
    for (const id in favMarkers) favMarkers[id].remove();

  function clearWalkRoute() {
    const src = map.getSource('walk-route');
    if (src) src.setData({ type: 'FeatureCollection', features: [] });

  function renderDirections(route, fromLngLat, toPoi) {
    const coords = buildRouteCoords(route);
    const src = map.getSource('walk-route');
    if (src) src.setData({
      type: 'FeatureCollection',
      features: coords.length ? [{
        type: 'Feature',
        geometry: { type: 'LineString', coordinates: coords },
        properties: {}
      }] : []
    });
    const panel = document.getElementById('directionsPanel');
    const summary = document.getElementById('directionsSummary');
    const stepsEl = document.getElementById('directionsSteps');
    const distStr = fmtDist((route.distance || 0) / 1000);
    const minutes = Math.round((route.distance || 0) / 80);  // ~5 km/h walking
    summary.innerHTML = `<strong>${esc(distStr)}</strong>` +
      `<span>· ~${minutes} min walking</span>` +
      `<span style="margin-left:auto;color:#888">to ${esc(toPoi.name || '?')}</span>`;
    const steps = instructionsFor(route);
    const iconFor = (a) => ({
      'start': '🚶', 'continue': '⬆', 'turn left': '↰', 'turn right': '↱', 'arrive': '📍'
    }[a] || '·');
    stepsEl.innerHTML = steps.map(s => {
      const distStr = s.distance > 0 ? fmtDist(s.distance / 1000) : '';
      const text = s.action === 'start'
        ? `Head along ${esc(s.name || 'the path')}`
        : s.action === 'arrive'
          ? 'Arrive at destination'
          : s.action === 'continue'
            ? `Continue on ${esc(s.name || 'the path')}`
            : `${s.action[0].toUpperCase() + s.action.slice(1)} onto ${esc(s.name || 'the path')}`;
      return `<div class="step"><span class="icon">${iconFor(s.action)}</span><span class="text">${text}</span><span class="dist">${esc(distStr)}</span></div>`;
    }).join('');
    panel.classList.add('show');
    panel.classList.remove('viewing-saved');
    if (coords.length) {
      const lngs = coords.map(c => c[0]), lats = coords.map(c => c[1]);
      map.fitBounds(
        [[Math.min(...lngs), Math.min(...lats)], [Math.max(...lngs), Math.max(...lats)]],
        { padding: { top: 80, bottom: 200, left: 40, right: 40 }, duration: 600 }
      );
    }
    // Walk-only snapshot: coords list, no transit legs, instructions stored as-is.
    currentRouteSnapshot = {
      kind: 'walk',
      coords: coords.slice(),
      walkSteps: steps.slice(),
      fromName: (fromLngLat && fromLngLat.name) || 'from',
      toName: (toPoi && toPoi.name) || 'to',
      distanceMeters: route.distance || 0,
    };
  }

  document.getElementById('directionsClose').onclick = clearWalkRoute;

  // ---------------- Saved routes ----------------
  const SAVED_ROUTES_KEY = 'cc.savedRoutes.v1';
  function loadSavedRoutes() {
    try { return JSON.parse(localStorage.getItem(SAVED_ROUTES_KEY) || '[]'); }
    catch { return []; }
  }
  function persistSavedRoutes(list) {
    localStorage.setItem(SAVED_ROUTES_KEY, JSON.stringify(list));
  }

  const directionsPanelEl = document.getElementById('directionsPanel');
  document.getElementById('directionsMinimize').onclick = () => {
    const minimized = directionsPanelEl.classList.toggle('minimized');
    document.getElementById('directionsMinimize').textContent = minimized ? '▲' : '▼';
  };
  document.getElementById('directionsSave').onclick = () => {
    if (!currentRouteSnapshot) {
      alert('No route to save yet.');
      return;
    }
    const defaultName = `${currentRouteSnapshot.fromName} → ${currentRouteSnapshot.toName}`;
    const name = prompt('Name this route:', defaultName);
    if (name === null) return;  // cancelled
    const list = loadSavedRoutes();
    list.push({
      id: Date.now(),
      savedAt: new Date().toISOString(),
      name: name.trim() || defaultName,
      ...currentRouteSnapshot,
    });
    persistSavedRoutes(list);
  };

  function renderSavedRoute(item) {
    // Paint geometry on the map source
    const src = map.getSource('walk-route');
    const features = [];
    if (item.kind === 'multimodal' && Array.isArray(item.styled)) {
      for (const seg of item.styled) {
        if (!seg.coords || !seg.coords.length) continue;
        features.push({
          type: 'Feature',
          geometry: { type: 'LineString', coordinates: seg.coords },
          properties: seg.kind === 'transit'
            ? { kind: 'transit', colour: seg.colour || '#e89035' }
            : { kind: 'walk' },
        });
      }
    } else if (item.kind === 'walk' && Array.isArray(item.coords) && item.coords.length) {
      features.push({
        type: 'Feature',
        geometry: { type: 'LineString', coordinates: item.coords },
        properties: { kind: 'walk' },
      });
    }
    if (src) src.setData({ type: 'FeatureCollection', features });

    // Trip-stop dots for saved routes
    const tripStopsSrc = map.getSource('route-trip-stops');
    if (tripStopsSrc) {
      const ts = (item.kind === 'multimodal' && Array.isArray(item.tripStops)) ? item.tripStops : [];
      tripStopsSrc.setData({
        type: 'FeatureCollection',
        features: ts.map(s => ({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [s.lng, s.lat] },
          properties: { name: s.name, colour: s.colour, role: s.role },
        })),
      });
    }

    // Summary + steps
    const panel = document.getElementById('directionsPanel');
    const summary = document.getElementById('directionsSummary');
    const stepsEl = document.getElementById('directionsSteps');
    if (item.kind === 'multimodal') {
      const parts = [
        `<strong>${fmtDuration(item.totalSec)}</strong>`,
        `<span>· ${fmtClockTime(item.startSec)} → ${fmtClockTime(item.endSec)}</span>`,
      ];
      if (item.transitCount) parts.push(`<span>· ${item.transitCount} ride${item.transitCount === 1 ? '' : 's'}</span>`);
      parts.push(`<span style="margin-left:auto;color:#888">${esc(item.fromName)} → ${esc(item.toName)}</span>`);
      summary.innerHTML = parts.join('');
      stepsEl.innerHTML = (item.steps || []).map(s => {
        if (s.kind === 'transit') return renderTransitStepHtml(s);
        return `<div class="step"><span class="icon">🚶</span><span class="text">${esc(s.text)}</span>${s.dep != null ? `<span class="dist">${fmtClockTime(s.dep)}–${fmtClockTime(s.arr)} (${fmtDuration(s.arr - s.dep)})</span>` : ''}</div>`;
      }).join('');
    } else {
      const distStr = fmtDist((item.distanceMeters || 0) / 1000);
      const minutes = Math.round((item.distanceMeters || 0) / 80);
      summary.innerHTML = `<strong>${esc(distStr)}</strong>` +
        `<span>· ~${minutes} min walking</span>` +
        `<span style="margin-left:auto;color:#888">${esc(item.fromName)} → ${esc(item.toName)}</span>`;
      const iconFor = (a) => ({
        'start': '🚶', 'continue': '⬆', 'turn left': '↰', 'turn right': '↱', 'arrive': '📍'
      }[a] || '·');
      stepsEl.innerHTML = (item.walkSteps || []).map(s => {
        const distStr = s.distance > 0 ? fmtDist(s.distance / 1000) : '';
        const text = s.action === 'start'
          ? `Head along ${esc(s.name || 'the path')}`
          : s.action === 'arrive'
            ? 'Arrive at destination'
            : s.action === 'continue'
              ? `Continue on ${esc(s.name || 'the path')}`
              : `${s.action[0].toUpperCase() + s.action.slice(1)} onto ${esc(s.name || 'the path')}`;
        return `<div class="step"><span class="icon">${iconFor(s.action)}</span><span class="text">${text}</span><span class="dist">${esc(distStr)}</span></div>`;
      }).join('');
    }
    panel.classList.add('show');
    panel.classList.add('viewing-saved');

    // Fit bounds
    let allCoords = [];
    if (item.kind === 'multimodal') allCoords = (item.styled || []).flatMap(s => s.coords || []);
    else allCoords = item.coords || [];
    if (allCoords.length) {
      const lngs = allCoords.map(c => c[0]), lats = allCoords.map(c => c[1]);
      map.fitBounds(
        [[Math.min(...lngs), Math.min(...lats)], [Math.max(...lngs), Math.max(...lats)]],
        { padding: { top: 80, bottom: 200, left: 40, right: 40 }, duration: 600 }
      );
    }
    currentRouteSnapshot = { ...item };
  }

  const savedRoutesPanel = document.getElementById('savedRoutesPanel');
  function renderSavedRoutesList() {
    const list = loadSavedRoutes().slice().reverse();  // newest first
    const el = document.getElementById('savedRoutesList');
    if (!list.length) {
      el.innerHTML = '<div style="color:#888; font-size:13px; padding:12px 4px;">No saved routes yet. Plan a route and tap 💾 to save it.</div>';
      return;
    }
    el.innerHTML = list.map(item => {
      const when = item.kind === 'multimodal'
        ? `${fmtClockTime(item.startSec)} → ${fmtClockTime(item.endSec)} · ${fmtDuration(item.totalSec)}`
        : `${fmtDist((item.distanceMeters || 0) / 1000)} walk`;
      return `<div class="saved-item" data-id="${item.id}">
        <div class="info">
          <div class="name">${esc(item.name || '(unnamed)')}</div>
          <div class="meta">${esc(when)}</div>
        </div>
        <button type="button" class="del" data-del-id="${item.id}" title="delete" aria-label="delete">×</button>
      </div>`;
    }).join('');
    el.querySelectorAll('[data-id]').forEach(row => {
      row.onclick = (e) => {
        if (e.target.closest('[data-del-id]')) return;
        const id = +row.dataset.id;
        const found = loadSavedRoutes().find(r => r.id === id);
        if (!found) return;
        savedRoutesPanel.classList.remove('show');
        closeRoutingPanel();
        renderSavedRoute(found);
      };
    });
    el.querySelectorAll('[data-del-id]').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const id = +btn.dataset.delId;
        const found = loadSavedRoutes().find(r => r.id === id);
        const label = found ? (found.name || 'this route') : 'this route';
        if (!confirm(`Delete "${label}"?`)) return;
        const list2 = loadSavedRoutes().filter(r => r.id !== id);
        persistSavedRoutes(list2);
        renderSavedRoutesList();
      };
    });
  }
  document.getElementById('routingViewSaved').onclick = () => {
    renderSavedRoutesList();
    savedRoutesPanel.classList.add('show');
  };
  document.getElementById('savedRoutesClose').onclick = () => {
    savedRoutesPanel.classList.remove('show');
  };
  savedRoutesPanel.addEventListener('click', (e) => {
    if (e.target === savedRoutesPanel) savedRoutesPanel.classList.remove('show');
  });

  // --- Schedule modal: full weekday schedule for a pattern at a stop ---
  const scheduleModal    = document.getElementById('scheduleModal');
  const scheduleTabsEl   = document.getElementById('scheduleTabs');
  const scheduleTimesEl  = document.getElementById('scheduleTimes');
  const scheduleTitleEl  = document.getElementById('scheduleTitle');
  const scheduleSubEl    = document.getElementById('scheduleSubtitle');

  // `defaultGtfsIdx` is Mon=0..Sun=6 (matching scheduleIdx.services[..].dow).
  function openScheduleModal(patternId, stopId, seq, highlightDep, defaultGtfsIdx) {
    // scheduleIdx.patterns and .tripsByPattern use numeric keys; stopId is
    // a GTFS string. Coerce here because data-* attrs always arrive as strings.
    patternId = Number(patternId);
    const pattern = scheduleIdx.patterns.get(patternId);
    const route   = pattern && scheduleIdx.routesById.get(pattern.route_id);
    const stop    = scheduleIdx.stops.get(stopId);
    scheduleTitleEl.textContent = route?.short
      ? `Route ${route.short}${route.long ? ' — ' + route.long : ''}`
      : 'Schedule';
    scheduleSubEl.textContent = stop?.name ? `Times departing at ${stop.name}` : '';

    // Collect dep times at `seq` grouped by weekday (Mon..Sun). Use Sets so
    // overlapping services (e.g. a base "weekday" plus a seasonal
    // "winter-weekday" service both active on Tue) don't produce duplicate
    // times.
    const perDaySet = Array.from({ length: 7 }, () => new Set());
    for (const trip of (scheduleIdx.tripsByPattern.get(patternId) || [])) {
      const svc = scheduleIdx.services.get(trip.s);
      if (!svc?.dow) continue;
      const cum = tripCumulative(trip);
      const dep = trip.f + (cum[seq] || 0);
      for (let gi = 0; gi < 7; gi++) if (svc.dow[gi] === 1) perDaySet[gi].add(dep);
    }
    const perDay = perDaySet.map(s => Array.from(s).sort((a, b) => a - b));

    const labels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    let activeIdx = Math.max(0, Math.min(6, defaultGtfsIdx ?? 0));
    if (!perDay[activeIdx].length) {
      const first = perDay.findIndex(a => a.length);
      if (first >= 0) activeIdx = first;
    }
    scheduleTabsEl.innerHTML = '';
    labels.forEach((lab, gi) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = lab;
      if (!perDay[gi].length) btn.classList.add('empty');
      if (gi === activeIdx) btn.classList.add('active');
      btn.addEventListener('click', () => {
        for (const b of scheduleTabsEl.children) b.classList.remove('active');
        btn.classList.add('active');
        renderTimes(perDay[gi], gi === activeIdx ? highlightDep : null);
      });
      scheduleTabsEl.appendChild(btn);
    });
    function renderTimes(times, highlight) {
      if (!times.length) {
        scheduleTimesEl.innerHTML = `<div class="empty-msg">No service on this day.</div>`;
        return;
      }
      scheduleTimesEl.innerHTML = times.map(t => {
        const match = highlight != null && Math.abs(t - highlight) < 1;
        return `<div class="t${match ? ' match' : ''}">${fmtClockTime(t)}</div>`;
      }).join('');
    }
    renderTimes(perDay[activeIdx], highlightDep);
    scheduleModal.classList.add('show');
  }
  document.getElementById('scheduleClose').onclick = () => scheduleModal.classList.remove('show');
  scheduleModal.addEventListener('click', (e) => {
    if (e.target === scheduleModal) scheduleModal.classList.remove('show');
  });
  // Delegated: tap the main row of a transit step to open its schedule.
  document.getElementById('directionsPanel').addEventListener('click', (e) => {
    const hdr = e.target.closest('.step.transit .step-header');
    if (!hdr || !hdr.dataset.pattern) return;
    openScheduleModal(
      hdr.dataset.pattern,
      hdr.dataset.stop,
      +hdr.dataset.seq,
      +hdr.dataset.dep,
      +hdr.dataset.gtfs,
    );
  });

  // Trip planner lives in static/trip-planner.js — the factory is bound
  // below (once walkGraph / scheduleIdx / MinHeap are in scope).
  let tripPlanner = null;

  // Convert a raw planner step-list into the leg shape the renderer expects.
  // Also recovers walking-distance-in-meters and the route metadata (which
  // the pure planner doesn't know about).
  function stepsToLegs(steps) {
    const legs = [];
    let walkBuf = null;
    const flushWalk = () => { if (walkBuf && walkBuf.edges.length) legs.push(walkBuf); walkBuf = null; };
    for (const s of steps) {
      if (s.type === 'walk') {
        if (!walkBuf) walkBuf = { type: 'walk', from: s.fromNode, to: s.toNode,
                                    edges: [], tDep: s.tDep, tArr: s.tArr };
        walkBuf.edges.push({ edge: s.edge, fromNode: s.fromNode, toNode: s.toNode });
        walkBuf.to = s.toNode;
        walkBuf.tArr = s.tArr;
      } else if (s.type === 'access') {
        flushWalk();
        legs.push({ type: 'access', fromNode: s.fromNode, stopId: s.stopId,
                    distance: s.walkSec * WALK_SPEED_MPS,
                    tDep: s.tDep, tArr: s.tArr });
      } else if (s.type === 'egress') {
        flushWalk();
        legs.push({ type: 'egress', stopId: s.stopId, toNode: s.toNode,
                    distance: s.walkSec * WALK_SPEED_MPS,
                    tDep: s.tDep, tArr: s.tArr });
      } else if (s.type === 'transit') {
        flushWalk();
        const route = scheduleIdx.routesById.get(
          scheduleIdx.patterns.get(s.patternId)?.route_id);
        legs.push({ type: 'transit', trip: s.trip, route, patternId: s.patternId,
                    fromStopId: s.fromStopId, toStopId: s.toStopId,
                    fromSeq: s.fromSeq, toSeq: s.toSeq,
                    tDep: s.tDep, tArr: s.tArr });
      }
    }
    flushWalk();
    return legs;
  }

  // Iterative alternatives: call the planner up to N times, each time
  // shifting the pivot past the last result's first/last transit boarding so
  // the next call surfaces a different bus. Stops on null / duplicate /
  // walk-only (nothing to nudge past).
  function planAlternatives(originId, destId, mode, pivotDate, walkWeight, transferSec, n = 3) {
    const out = [];
    let pivot = pivotDate;
    for (let i = 0; i < n; i++) {
      const t = todayInfo(pivot).nowSec;
      const activeTrips = makeActiveTrips(pivot);
      const raw = mode === 'arrive'
        ? tripPlanner.planReverse(originId, destId, t, walkWeight, transferSec, activeTrips)
        : tripPlanner.planForward(originId, destId, t, walkWeight, transferSec, activeTrips);
      if (!raw) break;
      if (out.some(r => r.startSec === raw.startSec && r.endSec === raw.endSec)) break;
      out.push(raw);
      const transitSteps = raw.steps.filter(s => s.type === 'transit');
      if (!transitSteps.length) break;
      const nextSec = mode === 'arrive'
        ? transitSteps[transitSteps.length - 1].tArr - 1
        : transitSteps[0].tDep + 60;
      const deltaSec = nextSec - t;
      if (Math.abs(deltaSec) < 1) break;
      pivot = new Date(pivot.getTime() + deltaSec * 1000);
    }
    return out;
  }

  // Build the per-search activeTrips closure the planner asks for. Handles
  // GTFS cross-midnight by considering trips from yesterday/today/tomorrow
  // with the appropriate offset.
  function makeActiveTrips(pivotDate) {
    const svcSets = expandedServiceSets(pivotDate);
    const cache = new Map();
    return (patternId) => {
      let c = cache.get(patternId);
      if (c) return c;
      const raw = scheduleIdx.tripsByPattern.get(patternId) || [];
      c = [];
      for (const trip of raw) {
        const off = tripDayOffset(trip, svcSets);
        if (off === null) continue;
        c.push({ trip, f: trip.f + off, cum: tripCumulative(trip) });
      }
      cache.set(patternId, c);
      return c;
    };
  }

  // Currently-shown route context (for saving). Set by renderRouteChoices /
  // renderDirections / renderSavedRoute. Cleared by clearWalkRoute.
  let currentRouteSnapshot = null;
  // Render a transit step row. The "N stops · first … last" line is a
  // <details> that expands to the full per-stop schedule on tap.
  function renderTransitStepHtml(s) {
    const colour = /^#[0-9a-f]{3,8}$/i.test(s.colour || '') ? s.colour : '#888';
    const hops = s.totalStops || 0;
    const intermediates = Array.isArray(s.intermediateStops) ? s.intermediateStops : [];
    let stopsBlock = '';
    if (hops > 0) {
      const countLabel = hops === 1 ? '1 stop' : `${hops} stops`;
      const firstName = intermediates[0]?.name || '';
      const lastName  = intermediates[intermediates.length - 1]?.name || '';
      const summary = intermediates.length >= 2
        ? `${esc(firstName)} … ${esc(lastName)}`
        : (intermediates.length === 1 ? esc(firstName) : '');
      // Full timeline: boarding → each intermediate → alighting.
      const rows = [
        `<li><span class="stop-time">${fmtClockTime(s.dep)}</span> <span class="stop-name">${esc(s.fromName)}</span></li>`,
        ...intermediates.map(st =>
          `<li><span class="stop-time">${fmtClockTime(st.arr)}</span> <span class="stop-name">${esc(st.name)}</span></li>`),
        `<li><span class="stop-time">${fmtClockTime(s.arr)}</span> <span class="stop-name">${esc(s.toName)}</span></li>`,
      ].join('');
      stopsBlock = `<details class="stops-details"><summary><span class="count">${countLabel}</span>${summary ? ' · ' + summary : ''}</summary><ol class="stops-timeline">${rows}</ol></details>`;
    }
    const hdrAttrs = s.patternId
      ? ` data-pattern="${esc(String(s.patternId))}" data-stop="${esc(String(s.fromStopId || ''))}" data-seq="${esc(String(s.fromSeq ?? 0))}" data-dep="${esc(String(s.dep ?? 0))}" data-gtfs="${esc(String(s.userGtfsIdx ?? 0))}"`
      : '';
    return `<div class="step transit">
      <div class="step-header"${hdrAttrs}>
        <span class="ref" style="background:${esc(colour)};color:#fff;padding:1px 6px;border-radius:3px;font-weight:600;margin-right:6px;">${esc(s.ref)}</span>
        <span class="text">${esc(s.fromName)} → ${esc(s.toName)}</span>
        <span class="dist">${fmtClockTime(s.dep)}–${fmtClockTime(s.arr)} (${fmtDuration(s.durationSec || (s.arr - s.dep))})</span>
      </div>
      ${stopsBlock}
    </div>`;
  }

  // Render one of the alternatives as the active route. `options` is the full list;
  // `selectedIdx` which one is currently highlighted. Tapping another promotes it.
  function renderRouteChoices(options, selectedIdx, fromLngLat, toPoi) {
    if (!options.length) return;
    const sel = options[Math.max(0, Math.min(selectedIdx, options.length - 1))];
    // Cache per-option so re-selecting a previously-shown alternative is instant.
    if (!sel._cache) {
      sel._cache = {
        styled: buildMultimodalCoords(sel),
        tripStops: collectTripStops(sel),
        steps: multimodalInstructions(sel),
      };
    }
    const styled = sel._cache.styled;
    const tripStops = sel._cache.tripStops;
    const src = map.getSource('walk-route');
    const features = [];
    for (const seg of styled) {
      if (!seg.coords.length) continue;
      features.push({
        type: 'Feature',
        geometry: { type: 'LineString', coordinates: seg.coords },
        properties: seg.kind === 'transit'
          ? { kind: 'transit', colour: seg.colour || '#e89035' }
          : { kind: 'walk' }
      });
    }
    if (src) src.setData({ type: 'FeatureCollection', features });

    // Paint per-leg intermediate/boarding/alighting stops for transit legs.
    const tripStopsSrc = map.getSource('route-trip-stops');
    if (tripStopsSrc) {
      tripStopsSrc.setData({
        type: 'FeatureCollection',
        features: tripStops.map(s => ({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [s.lng, s.lat] },
          properties: { name: s.name, colour: s.colour, role: s.role },
        })),
      });
    }

    const panel = document.getElementById('directionsPanel');
    const summary = document.getElementById('directionsSummary');
    const stepsEl = document.getElementById('directionsSteps');

    const transitCount = sel.legs.filter(l => l.type === 'transit').length;
    const summaryParts = [
      `<strong>${fmtDuration(sel.totalSec)}</strong>`,
      `<span>· ${fmtClockTime(sel.startSec)} → ${fmtClockTime(sel.endSec)}</span>`,
    ];
    if (transitCount > 0) summaryParts.push(`<span>· ${transitCount} ride${transitCount === 1 ? '' : 's'}</span>`);
    summaryParts.push(`<span style="margin-left:auto;color:#888">to ${esc(toPoi.name || '?')}</span>`);
    summary.innerHTML = summaryParts.join('');

    // Option strip: one pill per alternative, selected one highlighted
    const pills = options.map((opt, i) => {
      const isSel = i === selectedIdx;
      const rides = opt.legs.filter(l => l.type === 'transit').length;
      return `<button class="opt-pill ${isSel ? 'selected' : ''}" data-idx="${i}" type="button">
        <div class="opt-times">${fmtClockTime(opt.startSec)} → ${fmtClockTime(opt.endSec)}</div>
        <div class="opt-meta">${fmtDuration(opt.totalSec)}${rides ? ' · ' + rides + '×' : ''}</div>
      </button>`;
    }).join('');
    const optionStrip = options.length > 1
      ? `<div class="opt-strip">${pills}</div>` : '';

    const steps = sel._cache.steps;
    const stepsHtml = steps.map(s => {
      if (s.kind === 'transit') return renderTransitStepHtml(s);
      return `<div class="step"><span class="icon">🚶</span><span class="text">${esc(s.text)}</span>${s.dep != null ? `<span class="dist">${fmtClockTime(s.dep)}–${fmtClockTime(s.arr)} (${fmtDuration(s.arr - s.dep)})</span>` : ''}</div>`;
    }).join('');
    stepsEl.innerHTML = optionStrip + tripTotalsHtml(sel) + stepsHtml;
    stepsEl.querySelectorAll('.opt-pill').forEach(el => {
      el.onclick = () => {
        const idx = +el.dataset.idx;
        renderRouteChoices(options, idx, fromLngLat, toPoi);
      };
    });
    panel.classList.add('show');
    panel.classList.remove('viewing-saved');

    const allCoords = styled.flatMap(s => s.coords);
    if (allCoords.length && selectedIdx === 0) {
      const lngs = allCoords.map(c => c[0]), lats = allCoords.map(c => c[1]);
      map.fitBounds(
        [[Math.min(...lngs), Math.min(...lats)], [Math.max(...lngs), Math.max(...lats)]],
        { padding: { top: 80, bottom: 200, left: 40, right: 40 }, duration: 600 }
      );
    }
    currentRouteSnapshot = {
      kind: 'multimodal',
      styled, steps, tripStops,
      fromName: (fromLngLat && fromLngLat.name) || 'from',
      toName: toPoi && toPoi.name || 'to',
      startSec: sel.startSec, endSec: sel.endSec, totalSec: sel.totalSec,
      transitCount,
    };
  }

  function renderMultimodalDirections(mmRoute, fromLngLat, toPoi) {
    const styled = buildMultimodalCoords(mmRoute);
    const src = map.getSource('walk-route');
    const features = [];
    for (const seg of styled) {
      if (!seg.coords.length) continue;
      features.push({
        type: 'Feature',
        geometry: { type: 'LineString', coordinates: seg.coords },
        properties: seg.kind === 'transit'
          ? { kind: 'transit', colour: seg.colour || '#e89035' }
          : { kind: 'walk' }
      });
    }
    if (src) src.setData({ type: 'FeatureCollection', features });
    const tripStops = collectTripStops(mmRoute);
    const tripStopsSrc = map.getSource('route-trip-stops');
    if (tripStopsSrc) {

  function endpointIcon(ep) {
    if (!ep) return '○';
    if (ep.kind === 'my-location') return '📍';
    if (ep.kind === 'fav') return '★';
    return '📌';

    if (!ep) return '';
    if (ep.kind === 'my-location') return 'My location';

  }
  function resolveEndpoint(ep) {
    if (!ep) return null;
    if (ep.kind === 'my-location') {
      if (!lastKnownPos) return null;
      return { lng: lastKnownPos.lng, lat: lastKnownPos.lat, name: 'My location' };
    }
    return { lng: ep.lng, lat: ep.lat, name: ep.name || '' };

  function updateRoutingGoState() {
    const valid = routingFrom && routingTo
      && (routingFrom.kind !== 'my-location' || lastKnownPos)
      && (routingTo.kind !== 'my-location' || lastKnownPos);
    routingGo.disabled = !valid;

  function setRoutingEndpoint(which, ep) {
    if (which === 'from') {
      routingFrom = ep;
      routingFromInput.value = endpointLabel(ep);
      routingFromIcon.textContent = endpointIcon(ep);
    } else {
      routingTo = ep;
      routingToInput.value = endpointLabel(ep);
      routingToIcon.textContent = endpointIcon(ep);

    updateRoutingGoState();
  }

  function searchEndpoints(q) {
    const out = [];
    if (!q || 'my location'.includes(q.toLowerCase()) || q.toLowerCase().includes('my')) {
      if (lastKnownPos) out.push({ kind: 'my-location' });
    }
    const ql = (q || '').trim().toLowerCase();
    if (ql) {
      for (const f of favorites) {
        const n = (f.name || '').toLowerCase();
        if (n.includes(ql)) out.push({ kind: 'fav', ...f });
      }
    } else {
      for (const f of favorites.slice(0, 10)) out.push({ kind: 'fav', ...f });
    }
    const ref = lastKnownPos || (() => { const c = map.getCenter(); return { lng: c.lng, lat: c.lat }; })();
    const poiHits = [];
    for (const p of allPois) {
      if (ql && !(p.name && p.name.toLowerCase().includes(ql))) continue;
      if (!ql && p.name === undefined) continue;
      poiHits.push({ p, d: haversineKm(ref.lat, ref.lng, p.lat, p.lng) });
    }
    poiHits.sort((a, b) => a.d - b.d);
    const limit = ql ? 40 : 15;
    for (const { p } of poiHits.slice(0, limit)) {
      out.push({ kind: 'poi', name: p.name, lng: p.lng, lat: p.lat,
                 category: p.category, props: p.props });
    }
    return out.slice(0, 60);
  }

  function attachEndpointSearch(input, iconEl, which) {
    let dropdown = null;
    let suppressOpen = false;
    const render = () => {
      const items = searchEndpoints(input.value);
      if (!items.length) { closeDropdown(); return; }
      if (!dropdown) {
        dropdown = document.createElement('div');
        dropdown.className = 'ep-dropdown';
        input.parentElement.appendChild(dropdown);

      dropdown.innerHTML = items.map((it, i) => {
        const icon = endpointIcon(it);

        const meta = it.kind === 'poi' && it.category
          ? `<span class="meta">${esc(humanize(it.category))}</span>` : '';
        return `<div class="ep-suggest ${it.kind}" data-idx="${i}">
          <span class="icon">${icon}</span>
          <span>${esc(label)}</span>${meta}
        </div>`;
      }).join('');
      dropdown.onclick = (e) => {
        const row = e.target.closest('[data-idx]');
        if (!row) return;
        const it = items[+row.dataset.idx];
        setRoutingEndpoint(which, it);
        suppressOpen = true;
        input.blur();
        closeDropdown();

    };
    const closeDropdown = () => {
      if (dropdown) { dropdown.remove(); dropdown = null; }
    };
    input.addEventListener('focus', () => { if (!suppressOpen) render(); suppressOpen = false; });
    input.addEventListener('input', () => {
      // Clear the stored endpoint as soon as the user types: they are picking a new one.
      if (which === 'from') routingFrom = null; else routingTo = null;
      iconEl.textContent = '○';
      updateRoutingGoState();
      render();

    input.addEventListener('blur', () => { setTimeout(closeDropdown, 150); });

  function nowLocalDatetimeValue() {
    const w = walltimeInTz(new Date(), useTz());
    const pad = (n) => String(n).padStart(2, '0');
    return `${w.year}-${pad(w.month)}-${pad(w.day)}T${pad(w.hour)}:${pad(w.minute)}`;
  }
  // Parse a <input type="datetime-local"> value as wall-clock in the configured tz
  // and return the corresponding absolute Date.
  function parseDatetimeLocalInTz(s, tz) {
    const [datePart, timePart] = s.split('T');
    const [yy, mm, dd] = datePart.split('-').map(Number);
    const [hh, mi] = timePart.split(':').map(Number);
    const asIfUtc = new Date(Date.UTC(yy, mm - 1, dd, hh, mi, 0));
    const shown = walltimeInTz(asIfUtc, tz);
    const shownUtc = Date.UTC(shown.year, shown.month - 1, shown.day, shown.hour, shown.minute);
    const targetUtc = Date.UTC(yy, mm - 1, dd, hh, mi);
    return new Date(asIfUtc.getTime() + (targetUtc - shownUtc));
  }
  routingWhenMode.addEventListener('change', () => {
    const show = routingWhenMode.value !== 'now';
    routingWhenDt.style.display = show ? '' : 'none';

  function routingStartDate() {
    if (routingWhenMode.value === 'now') return new Date();
    if (!routingWhenDt.value) return new Date();
    return parseDatetimeLocalInTz(routingWhenDt.value, useTz());
  }

  async function runRoutingPlan() {
    const from = resolveEndpoint(routingFrom);
    const to = resolveEndpoint(routingTo);
    if (!from || !to) {
      alert('Pick both a From and a To first.');
      return;
    }
    // Single spinner covering both walk-graph hydration (first call can take
    // a second or two) and the Dijkstra search. Double-rAF lets the browser
    // paint the spinner before the main thread gets busy.
    const origLabel = routingGo.innerHTML;
    routingGo.classList.add('loading');
    routingGo.disabled = true;
    routingGo.innerHTML = '<span class="spinner"></span>Planning…';
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
    try {
      await ensureWalkGraph();
      if (walkGraph.nodes.size === 0) {
        alert('No walking graph for this region yet — save the area first.');
        return;
      }
      const start = findNearestWalkNode(from.lng, from.lat);
      const end = findNearestWalkNode(to.lng, to.lat);
      if (!start.id || !end.id) { alert('Could not find walkable path endpoints.'); return; }
      if (start.distance > 500 || end.distance > 500) {
        alert('One of the endpoints is too far from any walking path.');
        return;
      }
      const pivotDate = routingStartDate();
      const mode = routingWhenMode.value;  // 'now' | 'depart' | 'arrive'
      const toPoi = { name: to.name || '?', lng: to.lng, lat: to.lat };
      const walkWeight = currentWalkWeight();
      const transferSec = currentTransferSec();
      const canTransit = scheduleIdx.stops.size > 0 && scheduleIdx.stopToWalkNode.size > 0;
      if (canTransit) {
        const raws = planAlternatives(start.id, end.id, mode, pivotDate, walkWeight, transferSec);
        if (raws.length) {
          const pivotIso = pivotDate.toISOString();
          const plans = raws.map(raw => ({
            legs:     stepsToLegs(raw.steps),
            startSec: raw.startSec,
            endSec:   raw.endSec,
            totalSec: raw.endSec - raw.startSec,
            pivotDate: pivotIso,
          }));
          renderRouteChoices(plans, 0, from, toPoi);
          return;
        }
      }
      const route = astar(start.id, end.id);
      if (!route) { alert('No route found between those points.'); return; }
      renderDirections(route, from, toPoi);
    } catch (e) {
      console.error('routing failed:', e);
      alert('Could not plan route.');
    } finally {
      routingGo.classList.remove('loading');
      routingGo.disabled = false;
      routingGo.innerHTML = origLabel;
    }
  }
  routingGo.onclick = runRoutingPlan;

      })));

  function showTransitPopup(stopName, rids, lngLat, osmNodeIds = []) {
    const unique = [...new Set(rids)].filter(rid => routeMetaIndex[rid]);
    const departures = osmNodeIds.length
      ? nextDeparturesForOsmNodes(osmNodeIds, new Date(), 3)
      : [];
    if (!unique.length && !departures.length) return false;
    const items = unique.map(rid => {
      const m = routeMetaIndex[rid];
      const colour = /^#[0-9a-f]{3,8}$/i.test(m.colour || '') ? m.colour : '#888';
      const on = routeOn(rid);
      const viewing = viewedRoutes.has(rid);
      return `<div class="route-item">
        <span class="toggle-vis ${on ? 'on' : ''}" data-action="toggle" data-rid="${esc(rid)}" title="toggle line">${on ? '✓' : ''}</span>
        <span class="ref" style="background:${esc(colour)}">${esc(m.ref || '?')}</span>
        <span class="name">${esc(m.name || '(unnamed)')}</span>
        <button type="button" class="view-btn ${viewing ? 'on' : ''}" data-action="view" data-rid="${esc(rid)}" title="view stops">👁</button>
        <span class="mode">${esc(m.mode)}</span>
      </div>`;
    }).join('');
    const title = stopName
      ? `<div class="title">${esc(stopName)}${unique.length ? ' — ' + unique.length + ' route' + (unique.length === 1 ? '' : 's') : ''}</div>`
      : `<div class="title">${unique.length} route${unique.length === 1 ? '' : 's'} — ✓ toggles line, 👁 shows stops</div>`;
    let schedHtml = '';
    if (departures.length) {
      const rows = departures.map(g => {
        const colour = /^#[0-9a-f]{3,8}$/i.test(g.route?.colour || '') ? g.route.colour : '#888';
        const times = g.departures
          .map(d => `<span class="dep-time" title="${esc(d.headsign)}">${formatDepartureTime(d.dep)}</span>`)
          .join('');
        const short = g.route?.short || '?';
        const label = g.headsign || g.route?.long || '';
        const timesOrHint = times || `<span class="dep-empty">no upcoming — tap for full schedule</span>`;
        return `<div class="dep-row" data-pattern="${esc(String(g.patternId))}" data-stop="${esc(String(g.gtfsStopId))}" data-seq="${esc(String(g.seq))}" title="Tap to see all times">
          <span class="ref" style="background:${esc(colour)}">${esc(short)}</span>
          <span class="dep-times">${timesOrHint}</span>
          <span class="dep-name">${esc(label)}</span>
        </div>`;
      }).join('');
      schedHtml = `<div class="dep-section">
        <div class="dep-label">lines at this stop · tap for full schedule</div>
        ${rows}
      </div>`;
    }
    const html = `<div class="route-popup">${title}${items}${schedHtml}</div>`;
    const popup = new maplibregl.Popup({ closeButton: true, maxWidth: '360px' })
      .setLngLat(lngLat)
      .setHTML(html)
      .addTo(map);
    popup.getElement().querySelectorAll('.dep-row').forEach(el => {
      if (!el.dataset.pattern) return;
      el.onclick = () => {
        openScheduleModal(
          el.dataset.pattern,
          el.dataset.stop,
          +el.dataset.seq,
          null,
          todayInfo(new Date()).gtfsIdx,
        );
      };
    });
    popup.getElement().querySelectorAll('[data-action]').forEach(el => {
      el.onclick = async (ev) => {
        ev.stopPropagation();
        const rid = el.dataset.rid;
        if (el.dataset.action === 'toggle') {
          const nowOn = !routeOn(rid);
          transitState.routes[rid] = nowOn;
          if (nowOn) {
            const meta = routeMetaIndex[rid];
            if (meta && !modeOn(meta.mode)) {
              transitState.modes[meta.mode] = true;
              applyTransitTileVisibility();
            }
          }
          saveTransitState(transitState);
          el.classList.toggle('on', nowOn);
          el.textContent = nowOn ? '✓' : '';
          await refreshRoutesSource();
        } else if (el.dataset.action === 'view') {
          if (viewedRoutes.has(rid)) viewedRoutes.delete(rid);
          else viewedRoutes.add(rid);
          el.classList.toggle('on', viewedRoutes.has(rid));
          refreshStopsSource();
        }
      };
    });
    return true;
  }

  const TRANSIT_INFRA_CATS = new Set(['stop_position', 'platform', 'station']);
  function isRealPoi(f) {
    const pr = f.properties || {};
    const cat = pr.subclass || pr.class || '';
    return !TRANSIT_INFRA_CATS.has(cat);
  }
  function extractRouteIds(f) {
    let rids = f.properties && f.properties.route_ids;
    if (typeof rids === 'string') {
      try { rids = JSON.parse(rids); } catch { rids = null; }
    }
    return Array.isArray(rids) ? rids : [];
  }
  map.on('click', (e) => {
    const poiPad = 8;
    const routePad = 20;
    const poiBbox = [[e.point.x - poiPad, e.point.y - poiPad], [e.point.x + poiPad, e.point.y + poiPad]];
    const routeBbox = [[e.point.x - routePad, e.point.y - routePad], [e.point.x + routePad, e.point.y + routePad]];

    const bubbleHits = map.getLayer('route-stop-bubbles')
      ? map.queryRenderedFeatures(poiBbox, { layers: ['route-stop-bubbles'] })
      : [];
    const allPoiHits = map.queryRenderedFeatures(poiBbox, { layers: ['poi-icons'] });
    const realPoiHits = allPoiHits.filter(isRealPoi);
    const stopPoiHits = allPoiHits.filter(f => !isRealPoi(f));
    const routeHits = map.getLayer('bus-routes')
      ? map.queryRenderedFeatures(routeBbox, { layers: ['bus-routes'] })
      : [];

    const rids = new Set();
    const osmNodeIds = new Set();
    let stopName = '';
    for (const f of bubbleHits) {
      if (f.properties.rid) rids.add(f.properties.rid);
      if (f.properties.node_id != null) osmNodeIds.add(f.properties.node_id);
      if (!stopName && f.properties.name) stopName = f.properties.name;
    }
    if (stopPoiHits.length || bubbleHits.length) {
      const nearby = findStopsNear(e.lngLat.lng, e.lngLat.lat, 30);
      for (const s of nearby) {
        rids.add(s.rid);
        if (s.node_id != null) osmNodeIds.add(s.node_id);
        if (!stopName && s.name) stopName = s.name;
      }
      if (!stopName) {
        for (const f of stopPoiHits) {
          const pr = f.properties || {};
          const nm = pr['name:latin'] || pr.name || pr.name_int;
          if (nm) { stopName = nm; break; }
        }
      }
    }
    for (const f of routeHits) {
      for (const rid of extractRouteIds(f)) rids.add(rid);
    }

    // After the OSM→GTFS switch, findStopsNear returns GTFS stops directly,
    // so having any osmNodeIds at all means we can pop a schedule.
    const hasSchedule = osmNodeIds.size > 0;

    if ((rids.size || hasSchedule) && !realPoiHits.length) {
      if (showTransitPopup(stopName, [...rids], e.lngLat, [...osmNodeIds])) return;
    }

    const poiFallback = realPoiHits[0] || stopPoiHits[0] || null;
    if (poiFallback) {
      const pr = poiFallback.properties;
      const name = pr['name:latin'] || pr.name || pr.name_int || '(unnamed)';
      const [lng, lat] = poiFallback.geometry.coordinates;
      const full = findFullPoi(lng, lat, name);
      const poi = full || {
        lng, lat, name,
        category: pr.subclass || pr.class || '',
        props: {}
      };
      setSelected(poi);
      return;
    }

    setSelected(null);
  });

      if (p.category) counts.set(p.category, (counts.get(p.category) || 0) + 1);
    }
    const prev = searchFilter.value;
    const sorted = [...counts.entries()].sort((a, b) => b[1] - a[1]);
    searchFilter.innerHTML = '<option value="">all types</option>' +
      sorted.map(([c, n]) =>

    if (counts.has(prev)) searchFilter.value = prev;

  const ROW_HEIGHT = 52;
  const OVERSCAN = 3;
  let searchMatches = [];
  let rafScheduled = false;

  let countEl = null;

  function buildSearchFrame() {
    searchResults.innerHTML = '';
    countEl = document.createElement('div');
    countEl.className = 'poi-count';

    spacerEl.className = 'poi-spacer';

  function renderVisibleRows() {
    if (!spacerEl) return;
    const scrollTop = searchResults.scrollTop - (countEl ? countEl.offsetHeight : 0);
    const viewportHeight = searchResults.clientHeight;
    const start = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - OVERSCAN);

  function renderSearch() {
    const q = searchInput.value.trim();

    const qLower = q.toLowerCase();
    const ref = lastKnownPos || (() => { const c = map.getCenter(); return { lng: c.lng, lat: c.lat }; })();
    const matches = [];
    for (const p of allPois) {
      if (filter && p.category !== filter) continue;
      if (qLower && !(p.name && p.name.toLowerCase().includes(qLower))) continue;
      matches.push({ ...p, dist: haversineKm(ref.lat, ref.lng, p.lat, p.lng) });
    }
    matches.sort((a, b) => a.dist - b.dist);
    searchMatches = matches;

    if (!matches.length) {
      searchResults.innerHTML = '<div class="poi-result"><div class="info"><div class="name" style="color:#999">no matches in downloaded regions</div></div></div>';

      spacerEl.style.height = (matches.length * ROW_HEIGHT) + 'px';

  // Per-region storage measurement. Expensive (especially tiles) so it runs
  // asynchronously and fills in the size line after the panel renders.
  async function measureRegionTileBytes(urls) {
    try {
      const cache = await caches.open('tiles-v1');
      let total = 0;
      for (let i = 0; i < urls.length; i += 64) {
        const chunk = urls.slice(i, i + 64);
        const sizes = await Promise.all(chunk.map(async u => {
          const res = await cache.match(u);
          if (!res) return 0;
          const buf = await res.clone().arrayBuffer();
          return buf.byteLength;
        }));
        for (const s of sizes) total += s;
      }
      return total;
    } catch { return 0; }
  }
  async function measureIdbRecordBytes(dbName, storeName, key) {
    return new Promise((resolve) => {
      let db;
      const req = indexedDB.open(dbName);
      req.onerror = () => resolve(0);
      req.onsuccess = () => {
        db = req.result;
        if (!db.objectStoreNames.contains(storeName)) { db.close(); resolve(0); return; }
        try {
          const getReq = db.transaction(storeName, 'readonly').objectStore(storeName).get(key);
          getReq.onsuccess = () => {
            const rec = getReq.result;
            const bytes = rec ? new Blob([JSON.stringify(rec)]).size : 0;
            db.close();
            resolve(bytes);
          };
          getReq.onerror = () => { db.close(); resolve(0); };
        } catch { db.close(); resolve(0); }
      };
    });
  }
  async function measurePoiBytes(regionId) {
    return new Promise((resolve) => {
      const req = indexedDB.open(POI_DB_NAME);
      req.onerror = () => resolve(0);
      req.onsuccess = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains('pois')) { db.close(); resolve(0); return; }
        try {
          const idx = db.transaction('pois', 'readonly').objectStore('pois').index('regionId');
          const rq = idx.getAll(IDBKeyRange.only(regionId));
          rq.onsuccess = () => {
            let total = 0;
            for (const rec of rq.result) total += new Blob([JSON.stringify(rec)]).size;
            db.close();
            resolve(total);
          };
          rq.onerror = () => { db.close(); resolve(0); };
        } catch { db.close(); resolve(0); }
      };
    });
  }
  async function measureRegionBytes(region) {
    const [tiles, pois, schedule, walk] = await Promise.all([
      measureRegionTileBytes(region.urls || []),
      measurePoiBytes(region.id),
      measureIdbRecordBytes(SCHEDULE_DB_NAME, 'regions', region.id),
      measureIdbRecordBytes(WALK_DB_NAME,     'regions', region.id),
    ]);
    return { tiles, pois, schedule, walk, total: tiles + pois + schedule + walk };
  }
  function fmtBytes(n) {
    if (n < 1024) return `${n} B`;
    if (n < 1024 * 1024) return `${(n / 1024).toFixed(0)} KB`;
    if (n < 1024 * 1024 * 10) return `${(n / 1048576).toFixed(1)} MB`;
    return `${Math.round(n / 1048576)} MB`;
  }

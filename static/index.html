<script>
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent)
  || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
const isStandalone = window.navigator.standalone
  || window.matchMedia('(display-mode: standalone)').matches;
if (isIOS && !isStandalone && localStorage.getItem('cc.installDismissed') !== '1') {
  document.getElementById('install').classList.add('show');
}
document.getElementById('installDismiss').onclick = () => {
  localStorage.setItem('cc.installDismissed', '1');
  document.getElementById('install').classList.remove('show');
};

async function updateStorageInfo() {
  const el = document.getElementById('storage');
  if (!el || !navigator.storage) return;
  const parts = [];
  if (navigator.storage.persisted) {
    parts.push((await navigator.storage.persisted()) ? 'persistent ✓' : 'not persistent');
  }
  if (navigator.storage.estimate) {
    const { usage = 0, quota = 0 } = await navigator.storage.estimate();
    const mb = (n) => (n / 1048576).toFixed(1) + 'MB';
    parts.push(`${mb(usage)} / ${mb(quota)}`);
  }
  el.textContent = parts.join(' · ');
}

async function requestPersistent() {
  if (navigator.storage && navigator.storage.persist) {
    try { await navigator.storage.persist(); } catch {}
  }
  updateStorageInfo();
}
requestPersistent();

const POI_DB_NAME = 'cc.pois.v1';
function openPoiDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(POI_DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains('pois')) {
        const store = db.createObjectStore('pois', { autoIncrement: true });
        store.createIndex('regionId', 'regionId');
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function savePois(regionId, pois) {
  if (!pois.length) return;
  const db = await openPoiDB();
  const tx = db.transaction('pois', 'readwrite');
  const store = tx.objectStore('pois');
  for (const p of pois) store.put({ ...p, regionId });
  await new Promise((r, j) => { tx.oncomplete = r; tx.onerror = () => j(tx.error); });
  db.close();
}
async function loadAllPois() {
  const db = await openPoiDB();
  return new Promise((resolve, reject) => {
    const req = db.transaction('pois', 'readonly').objectStore('pois').getAll();
    req.onsuccess = () => { resolve(req.result); db.close(); };
    req.onerror = () => reject(req.error);
  });
}
async function deletePoisByRegion(regionId) {
  const db = await openPoiDB();
  const tx = db.transaction('pois', 'readwrite');
  const idx = tx.objectStore('pois').index('regionId');
  const req = idx.openCursor(IDBKeyRange.only(regionId));
  await new Promise((res, rej) => {
    req.onsuccess = (e) => { const c = e.target.result; if (c) { c.delete(); c.continue(); } else res(); };
    req.onerror = () => rej(req.error);
  });
  db.close();
}

function lonLatToTile(lon, lat, z) {
  const n = 2 ** z;
  const x = Math.floor((lon + 180) / 360 * n);
  const latRad = lat * Math.PI / 180;
  const y = Math.floor((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n);
  return [Math.max(0, Math.min(n - 1, x)), Math.max(0, Math.min(n - 1, y))];
}

function estimateTiles(bbox, minZoom, maxZoom) {
  const [w, s, e, n] = bbox;
  let count = 0;
  for (let z = minZoom; z <= maxZoom; z++) {
    const [xMin, yMin] = lonLatToTile(w, n, z);
    const [xMax, yMax] = lonLatToTile(e, s, z);
    count += (Math.abs(xMax - xMin) + 1) * (Math.abs(yMax - yMin) + 1);
  }
  return count;
}

const AVG_TILE_BYTES = 15 * 1024;

function loadRegions() { return JSON.parse(localStorage.getItem(regionsKey) || '[]'); }
function saveRegions(r) { localStorage.setItem(regionsKey, JSON.stringify(r)); }
function bboxCenter(b) { return [(b[0] + b[2]) / 2, (b[1] + b[3]) / 2]; }
function fmtCoord(lon, lat) {
  const ns = lat >= 0 ? 'N' : 'S', ew = lon >= 0 ? 'E' : 'W';
  return `${Math.abs(lat).toFixed(2)}°${ns}, ${Math.abs(lon).toFixed(2)}°${ew}`;
}
function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })
    + ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
}

(async () => {
  if (!('serviceWorker' in navigator)) {
    document.getElementById('status').textContent =
      'ServiceWorker unavailable — cannot run in offline-only mode on this browser.';
    return;
  }

  await navigator.serviceWorker.register('/sw.js');
  await navigator.serviceWorker.ready;

  const viewKey = 'cc.view.v1';
  const savedView = (() => {
    try { return JSON.parse(localStorage.getItem(viewKey) || 'null'); } catch { return null; }
  })();

  const map = new maplibregl.Map({
    container: 'map',
    center: savedView?.center || [0, 0],
    zoom: savedView?.zoom ?? 2,
    bearing: savedView?.bearing || 0,
    pitch: savedView?.pitch || 0,
    style: {
      version: 8,
      glyphs: location.origin + '/fonts/{fontstack}/{range}.pbf',
      sources: {
        local: { type: 'vector', tiles: [location.origin + '/tiles/{z}/{x}/{y}.pbf'], minzoom: 0, maxzoom: 14 }
      },
      layers: [
        { id: 'bg', type: 'background', paint: { 'background-color': '#f5f5dc' } },
        { id: 'landcover', type: 'fill', source: 'local', 'source-layer': 'landcover', paint: { 'fill-color': '#e6e6d6' } },
        { id: 'landuse', type: 'fill', source: 'local', 'source-layer': 'landuse', paint: { 'fill-color': '#e0e0d0' } },
        { id: 'water', type: 'fill', source: 'local', 'source-layer': 'water', paint: { 'fill-color': '#a0c8f0' } },
        { id: 'buildings', type: 'fill', source: 'local', 'source-layer': 'building', minzoom: 13, paint: { 'fill-color': '#d9d0c9' } },
        { id: 'roads', type: 'line', source: 'local', 'source-layer': 'transportation', paint: { 'line-color': '#ffffff', 'line-width': 1 } },
        { id: 'rail-mainline', type: 'line', source: 'local', 'source-layer': 'transportation',
          filter: ['==', ['get', 'class'], 'rail'],
          layout: { visibility: localStorage.getItem('cc.transitOn') === '0' ? 'none' : 'visible' },
          paint: {
            'line-color': '#555',
            'line-width': ['interpolate', ['linear'], ['zoom'], 10, 0.5, 14, 1.8, 18, 3.5],
            'line-dasharray': [2, 2]
          } },
        { id: 'subway', type: 'line', source: 'local', 'source-layer': 'transportation',
          filter: ['==', ['get', 'class'], 'subway'],
          layout: { visibility: localStorage.getItem('cc.transitOn') === '0' ? 'none' : 'visible' },
          paint: {
            'line-color': '#d94a4a',
            'line-width': ['interpolate', ['linear'], ['zoom'], 10, 1, 14, 2.5, 18, 5]
          } },
        { id: 'tram', type: 'line', source: 'local', 'source-layer': 'transportation',
          filter: ['==', ['get', 'class'], 'tram'],
          layout: { visibility: localStorage.getItem('cc.transitOn') === '0' ? 'none' : 'visible' },
          paint: {
            'line-color': '#6a4ab5',
            'line-width': ['interpolate', ['linear'], ['zoom'], 10, 0.5, 14, 1.5, 18, 3]
          } },
        { id: 'light-rail', type: 'line', source: 'local', 'source-layer': 'transportation',
          filter: ['==', ['get', 'class'], 'light_rail'],
          layout: { visibility: localStorage.getItem('cc.transitOn') === '0' ? 'none' : 'visible' },
          paint: {
            'line-color': '#2e8fbf',
            'line-width': ['interpolate', ['linear'], ['zoom'], 10, 0.5, 14, 1.5, 18, 3]
          } },
        { id: 'road-labels', type: 'symbol', source: 'local', 'source-layer': 'transportation_name',
          minzoom: 13,
          layout: { 'text-field': ['coalesce', ['get', 'name:latin'], ['get', 'name'], ['get', 'name_int']], 'text-font': ['KlokanTech Noto Sans Regular'],
                    'text-size': 11, 'symbol-placement': 'line' },
          paint: { 'text-color': '#555', 'text-halo-color': '#fff', 'text-halo-width': 1 } },
        { id: 'poi-icons', type: 'symbol', source: 'local', 'source-layer': 'poi',
          layout: {
            'icon-image': ['coalesce',
              ['image', ['get', 'subclass']],
              ['image', ['get', 'class']],
              ['image', 'poi-default']],
            'icon-size': ['interpolate', ['exponential', 1.5], ['zoom'],
              11, 0.08, 14, 0.2, 16, 0.4, 18, 0.75, 20, 1.0],
            'icon-allow-overlap': true,
            'icon-ignore-placement': true
          } },
        { id: 'poi-labels', type: 'symbol', source: 'local', 'source-layer': 'poi',
          minzoom: 15,
          layout: { 'text-field': ['coalesce', ['get', 'name:latin'], ['get', 'name'], ['get', 'name_int']], 'text-font': ['KlokanTech Noto Sans Regular'],
                    'text-size': 11, 'text-offset': [0, 0.9], 'text-anchor': 'top',
                    'text-optional': true },
          paint: { 'text-color': '#333', 'text-halo-color': '#fff', 'text-halo-width': 1.5 } },
        { id: 'places', type: 'symbol', source: 'local', 'source-layer': 'place',
          layout: { 'text-field': ['coalesce', ['get', 'name:latin'], ['get', 'name'], ['get', 'name_int']], 'text-font': ['KlokanTech Noto Sans Regular'],
                    'text-size': ['match', ['get', 'class'], 'city', 14, 'town', 12, 10] },
          paint: { 'text-color': '#333', 'text-halo-color': '#fff', 'text-halo-width': 1 } }
      ]
    },
  });
  class RefreshControl {
    onAdd() {
      const c = document.createElement('div');
      c.className = 'maplibregl-ctrl maplibregl-ctrl-group';
      const b = document.createElement('button');
      b.type = 'button';
      b.title = 'refresh app (keeps saved maps)';
      b.setAttribute('aria-label', 'refresh app');
      b.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:block;margin:auto"><path d="M17.65 6.35A7.96 7.96 0 0 0 12 4a8 8 0 1 0 7.73 10H17.6A5.99 5.99 0 0 1 12 18a6 6 0 1 1 4.22-10.22L13 11h7V4z"/></svg>`;
      b.onclick = async () => {
        b.disabled = true;
        const reg = await navigator.serviceWorker.ready;
        const onMsg = (e) => {
          if (e.data && e.data.type === 'appShellRefreshed') {
            navigator.serviceWorker.removeEventListener('message', onMsg);
            location.reload();
          }
        };
        navigator.serviceWorker.addEventListener('message', onMsg);
        reg.active.postMessage({ type: 'refreshAppShell' });
      };
      c.appendChild(b);
      return c;
    }
    onRemove() {}
  }
  map.addControl(new RefreshControl(), 'bottom-right');

  const TRANSIT_LAYERS = ['rail-mainline', 'subway', 'tram', 'light-rail'];
  class TransitToggleControl {
    onAdd() {
      const c = document.createElement('div');
      c.className = 'maplibregl-ctrl maplibregl-ctrl-group';
      const b = document.createElement('button');
      b.type = 'button';
      b.title = 'toggle transit lines';
      b.setAttribute('aria-label', 'toggle transit lines');
      b.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:block;margin:auto"><path d="M4 15.5C4 17.43 5.57 19 7.5 19L6 20.5V21h12v-.5L16.5 19c1.93 0 3.5-1.57 3.5-3.5V5c0-3.5-3.58-4-8-4s-8 .5-8 4v10.5zM7.5 17c-.83 0-1.5-.67-1.5-1.5S6.67 14 7.5 14s1.5.67 1.5 1.5S8.33 17 7.5 17zm9 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM18 11H6V6h12v5z"/></svg>`;
      const applyState = () => {
        const on = localStorage.getItem('cc.transitOn') !== '0';
        b.style.opacity = on ? '1' : '0.4';
        b.setAttribute('aria-pressed', String(on));
        for (const id of TRANSIT_LAYERS) {
          if (map.getLayer(id)) {
            map.setLayoutProperty(id, 'visibility', on ? 'visible' : 'none');
          }
        }
      };
      b.onclick = () => {
        const on = localStorage.getItem('cc.transitOn') !== '0';
        localStorage.setItem('cc.transitOn', on ? '0' : '1');
        applyState();
      };
      this._apply = applyState;
      c.appendChild(b);
      return c;
    }
    onRemove() {}
  }
  const transitCtrl = new TransitToggleControl();
  map.addControl(transitCtrl, 'bottom-right');
  map.on('styledata', () => { if (transitCtrl._apply) transitCtrl._apply(); });

  map.addControl(new maplibregl.NavigationControl(), 'bottom-right');

  map.on('moveend', () => {
    const c = map.getCenter();
    localStorage.setItem(viewKey, JSON.stringify({
      center: [c.lng, c.lat], zoom: map.getZoom(),
      bearing: map.getBearing(), pitch: map.getPitch()
    }));
  });
  map.addControl(new maplibregl.ScaleControl({ maxWidth: 120, unit: 'metric' }), 'bottom-left');

  const geolocate = new maplibregl.GeolocateControl({
    positionOptions: { enableHighAccuracy: true },
    trackUserLocation: true,
    showUserHeading: true,
    fitBoundsOptions: { maxZoom: 15 }
  });
  map.addControl(geolocate, 'bottom-right');

  map.on('load', () => {
    if (!savedView && localStorage.getItem('cc.geoPromptDone') !== '1') {
      geolocate.trigger();
      localStorage.setItem('cc.geoPromptDone', '1');
    }
  });

  geolocate.on('error', (e) => {
    const status = document.getElementById('status');
    if (status) status.textContent = 'location: ' + (e && e.message ? e.message : 'unavailable');
  });

  let lastKnownPos = null;
  geolocate.on('geolocate', (e) => {
    lastKnownPos = { lng: e.coords.longitude, lat: e.coords.latitude };
  });

  async function svgToImageData(svgText, size = 24, dpr = 2) {
    const blob = new Blob([svgText], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    try {
      const img = new Image();
      img.src = url;
      await img.decode();
      const canvas = document.createElement('canvas');
      canvas.width = size * dpr;
      canvas.height = size * dpr;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, size * dpr, size * dpr);
      return { data: ctx.getImageData(0, 0, size * dpr, size * dpr), pixelRatio: dpr };
    } finally {
      URL.revokeObjectURL(url);
    }
  }

  async function registerIconFromSvg(name, svgText) {
    if (map.hasImage(name)) return true;
    try {
      const { data, pixelRatio } = await svgToImageData(svgText);
      map.addImage(name, data, { pixelRatio });
      if (name.includes('-')) {
        const us = name.replace(/-/g, '_');
        if (!map.hasImage(us)) map.addImage(us, data, { pixelRatio });
      }
      const aliases = ICON_ALIAS_MAP[name];
      if (aliases) {
        for (const a of aliases) {
          if (!map.hasImage(a)) map.addImage(a, data, { pixelRatio });
        }
      }
      return true;
    } catch { return false; }
  }

  async function loadIcon(name, opts = {}) {
    if (map.hasImage(name)) return true;
    try {
      const headers = opts.download ? { 'X-Download': '1' } : {};
      const res = await fetch(`/icons/${encodeURIComponent(name)}.svg`, { headers });
      if (!res.ok || res.status === 204) return false;
      const svg = await res.text();
      if (!svg) return false;
      return registerIconFromSvg(name, svg);
    } catch { return false; }
  }

  const DEFAULT_MARKER_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 15 15"><path d="M7.5 1C5.42 1 3 2.29 3 5.57C3 7.79 6.46 12.71 7.5 14C8.42 12.71 12 7.91 12 5.57C12 2.29 9.58 1 7.5 1Z" fill="#555" stroke="#fff" stroke-width="0.6" stroke-linejoin="round"/></svg>`;

  async function registerDefaultMarker() {

  async function loadAllIcons(opts = {}) {
    try {
      const res = await fetch('/iconslist', opts.download ? { headers: { 'X-Download': '1' } } : undefined);
      if (!res.ok) return 0;
      const { files = [] } = await res.json();
      if (!files.length) return 0;
      const names = files.map(f => f.replace(/\.svg$/, ''));
      let loaded = 0;
      await Promise.all(names.map(async (n) => { if (await loadIcon(n, opts)) loaded++; }));
      if (loaded) map.triggerRepaint();
      return loaded;
    } catch { return 0; }
  }

  function haversineKm(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const toRad = (d) => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat / 2) ** 2
      + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(a));
  }
  function fmtDist(km) {
    if (km < 1) return `${Math.round(km * 1000)} m`;
    if (km < 10) return `${km.toFixed(1)} km`;
    return `${Math.round(km)} km`;
  }

  const esc = (s) => String(s).replace(/[&<>"']/g,
    c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  const humanize = (s) => String(s || '').replace(/_/g, ' ')
    .replace(/\b\w/g, c => c.toUpperCase());

  const CATEGORY_TO_ICON_FILE = (() => {
    const m = {};
    for (const [file, aliases] of Object.entries(ICON_ALIAS_MAP)) {
      for (const a of aliases) m[a] = file;
    }
    return m;
  })();
  function iconFileFor(cat) {
    if (!cat) return 'marker';
    if (CATEGORY_TO_ICON_FILE[cat]) return CATEGORY_TO_ICON_FILE[cat];
    if (cat.includes('_')) return cat.replace(/_/g, '-');
    return cat;
  }

  function findFullPoi(lng, lat, name) {
    for (const p of allPois) {
      if (p.name === name
          && Math.abs(p.lng - lng) < 1e-4
          && Math.abs(p.lat - lat) < 1e-4) {
        return p;
      }
    }
    return null;
  }

  function renderPoiCard(poi) {

    const cat = poi.category ? humanize(poi.category) : '';
    document.getElementById('poiCardMeta').textContent =
      [cat, dist].filter(Boolean).join(' · ');

    const p = poi.props || {};
    const rows = [];
    const telHref = (s) => 'tel:' + s.replace(/[^\d+]/g, '');
    const webHref = (s) => s.startsWith('http') ? s : 'https://' + s;

    const street = [p['addr:housenumber'], p['addr:street']].filter(Boolean).join(' ');
    const city = [p['addr:city'], p['addr:postcode']].filter(Boolean).join(' ');
    const addr = [street, city].filter(Boolean).join(', ');
    if (addr) rows.push(`<div class="row"><span class="lbl">📍</span><span class="val">${esc(addr)}</span></div>`);

    if (p.opening_hours) rows.push(`<div class="row"><span class="lbl">🕐</span><span class="val">${esc(p.opening_hours)}</span></div>`);

    const phone = p.phone || p['contact:phone'];
    if (phone) rows.push(`<div class="row"><span class="lbl">📞</span><span class="val"><a href="${esc(telHref(phone))}">${esc(phone)}</a></span></div>`);

    const website = p.website || p['contact:website'];
    if (website) rows.push(`<div class="row"><span class="lbl">🌐</span><span class="val"><a href="${esc(webHref(website))}" target="_blank" rel="noopener">${esc(website)}</a></span></div>`);

    if (p.wheelchair) {
      const mark = p.wheelchair === 'yes' ? '♿' : p.wheelchair === 'limited' ? '◐' : '✕';
      rows.push(`<div class="row"><span class="lbl">${mark}</span><span class="val">wheelchair: ${esc(humanize(p.wheelchair))}</span></div>`);
    }

    if (p.internet_access && p.internet_access !== 'no') {
      rows.push(`<div class="row"><span class="lbl">📶</span><span class="val">wifi: ${esc(humanize(p.internet_access))}</span></div>`);
    }

    const brandOp = [p.brand, p.operator && p.operator !== p.brand ? p.operator : null].filter(Boolean).join(' · ');
    if (brandOp) rows.push(`<div class="row"><span class="lbl">🏢</span><span class="val">${esc(brandOp)}</span></div>`);

    if (p.cuisine) {
      const cuisines = p.cuisine.split(';').map(c => humanize(c.trim())).join(', ');
      rows.push(`<div class="row"><span class="lbl">🍽️</span><span class="val">${esc(cuisines)}</span></div>`);
    }

    if (p.description) rows.push(`<div class="row"><span class="lbl">💬</span><span class="val">${esc(p.description)}</span></div>`);

    if (p.wikipedia) {
      const parts = p.wikipedia.split(':');
      if (parts.length >= 2) {
        const lang = parts[0];
        const article = parts.slice(1).join(':');
        const url = `https://${lang}.wikipedia.org/wiki/${encodeURIComponent(article.replace(/ /g, '_'))}`;
        rows.push(`<div class="row"><span class="lbl">📚</span><span class="val"><a href="${esc(url)}" target="_blank" rel="noopener">Wikipedia: ${esc(article)}</a></span></div>`);
      }

      const url = `https://www.wikidata.org/wiki/${encodeURIComponent(p.wikidata)}`;
      rows.push(`<div class="row"><span class="lbl">📚</span><span class="val"><a href="${esc(url)}" target="_blank" rel="noopener">Wikidata: ${esc(p.wikidata)}</a></span></div>`);

    const f = hits[0];

    const [lng, lat] = f.geometry.coordinates;
    const full = findFullPoi(lng, lat, name);

  function populateFilter() {
    const counts = new Map();
    for (const p of allPois) {
      if (p.category) counts.set(p.category, (counts.get(p.category) || 0) + 1);
    }
    const prev = searchFilter.value;
    const sorted = [...counts.entries()].sort((a, b) => b[1] - a[1]);
    searchFilter.innerHTML = '<option value="">all types</option>' +
      sorted.map(([c, n]) =>
        `<option value="${esc(c)}">${esc(humanize(c))} (${n.toLocaleString()})</option>`).join('');
    if (counts.has(prev)) searchFilter.value = prev;
  }

  const ROW_HEIGHT = 52;
  const OVERSCAN = 3;
  let searchMatches = [];
  let rafScheduled = false;
  let spacerEl = null;
  let countEl = null;

  function buildSearchFrame() {
    searchResults.innerHTML = '';
    countEl = document.createElement('div');
    countEl.className = 'poi-count';
    spacerEl = document.createElement('div');
    spacerEl.className = 'poi-spacer';
    searchResults.appendChild(countEl);
    searchResults.appendChild(spacerEl);
  }

  function renderVisibleRows() {
    if (!spacerEl) return;
    const scrollTop = searchResults.scrollTop - (countEl ? countEl.offsetHeight : 0);
    const viewportHeight = searchResults.clientHeight;
    const start = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - OVERSCAN);
    const end = Math.min(searchMatches.length - 1,
      Math.ceil((scrollTop + viewportHeight) / ROW_HEIGHT) + OVERSCAN);
    const parts = [];
    for (let i = start; i <= end; i++) {
      const p = searchMatches[i];
      parts.push(`<div class="poi-result" data-idx="${i}" style="position:absolute;top:${i * ROW_HEIGHT}px;left:0;right:0">
        <div class="info">
          <div class="name">${esc(p.name)}</div>
          ${p.category ? `<div class="cat">${esc(humanize(p.category))}</div>` : ''}
        </div>
        <div class="dist">${fmtDist(p.dist)}</div>
      </div>`);
    }
    spacerEl.innerHTML = parts.join('');
  }

  function renderSearch() {
    const q = searchInput.value.trim();
    const filter = searchFilter.value;
    const qLower = q.toLowerCase();
    const ref = lastKnownPos || (() => { const c = map.getCenter(); return { lng: c.lng, lat: c.lat }; })();
    const matches = [];
    for (const p of allPois) {
      if (filter && p.category !== filter) continue;
      if (qLower && !(p.name && p.name.toLowerCase().includes(qLower))) continue;
      matches.push({ ...p, dist: haversineKm(ref.lat, ref.lng, p.lat, p.lng) });
    }
    matches.sort((a, b) => a.dist - b.dist);
    searchMatches = matches;

    if (!matches.length) {
      searchResults.innerHTML = '<div class="poi-result"><div class="info"><div class="name" style="color:#999">no matches in downloaded regions</div></div></div>';
      spacerEl = null; countEl = null;
    } else {
      buildSearchFrame();
      countEl.textContent = `${matches.length.toLocaleString()} match${matches.length === 1 ? '' : 'es'}`;
      spacerEl.style.height = (matches.length * ROW_HEIGHT) + 'px';
      searchResults.scrollTop = 0;
      renderVisibleRows();
    }
    searchResults.classList.add('show');
  }

  searchResults.addEventListener('scroll', () => {
    if (rafScheduled) return;
    rafScheduled = true;
    requestAnimationFrame(() => {
      rafScheduled = false;
      renderVisibleRows();
    });
  }, { passive: true });

  searchResults.addEventListener('click', (e) => {
    const row = e.target.closest('.poi-result[data-idx]');

    setSelected(p, { flyTo: true });
    searchInput.value = '';
    searchResults.classList.remove('show');

  searchInput.addEventListener('input', () => {

  const currentBbox = () => {

  const MIN_ZOOM = 1;
  function updateDownloadLabel() {
    const btn = document.getElementById('downloadBtn');
    const maxZoom = +document.getElementById('zMax').value;
    if (maxZoom < MIN_ZOOM) { btn.textContent = '↓ max zoom too low'; return; }
    const count = estimateTiles(currentBbox(), MIN_ZOOM, maxZoom);
    const mb = (count * AVG_TILE_BYTES / 1048576 + POI_MB_PER_REGION).toFixed(1);
    btn.textContent = `↓ save current view (${count.toLocaleString()} tiles + POIs, ~${mb} MB)`;
  }

  function renderRegions() {
    const list = loadRegions();
    document.getElementById('offlineBadge').textContent = list.length ? `(${list.length})` : '';
    const el = document.getElementById('regions');
    el.innerHTML = '';
    for (const r of list) {
      const [clon, clat] = bboxCenter(r.bbox);
      const when = r.createdAt ? fmtDate(r.createdAt) : '';
      const row = document.createElement('div');
      row.className = 'region';
      row.innerHTML = `<div><div class="label">${fmtCoord(clon, clat)}</div>
        <div class="meta">${when} · z${r.minZoom}–${r.maxZoom} · ${r.tileCount} tiles</div></div>
        <div><button data-goto="${r.id}">go</button>
        <button data-del="${r.id}">×</button></div>`;
      el.appendChild(row);

    el.querySelectorAll('[data-goto]').forEach(b => b.onclick = () => {
      const r = loadRegions().find(x => x.id === b.dataset.goto);
      if (r) map.fitBounds([[r.bbox[0], r.bbox[1]], [r.bbox[2], r.bbox[3]]]);
    });
    el.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
      const id = b.dataset.del;
      const list = loadRegions();
      const r = list.find(x => x.id === id);
      if (!r) return;
      if (!confirm('delete this map?')) return;
      const reg = await navigator.serviceWorker.ready;
      reg.active.postMessage({ type: 'deleteTiles', urls: r.urls });
      await deletePoisByRegion(id);
      allPois = allPois.filter(p => p.regionId !== id);
      saveRegions(list.filter(x => x.id !== id));
      renderRegions();
      renderPoiStat();
      populateFilter();
      updateAppDataLabel();
      updateStorageInfo();
    });
  }

  async function getFontUrls() {
    const fontstack = 'KlokanTech Noto Sans Regular';
    try {
      const res = await fetch(`/fontslist/${encodeURIComponent(fontstack)}`,
        { headers: { 'X-Download': '1' } });
      if (!res.ok) return [];
      const { files } = await res.json();
      return files.map(f => `/fonts/${encodeURIComponent(fontstack)}/${f}`);
    } catch { return []; }
  }

  async function fetchAndSavePois(regionId, bbox) {
    try {
      const pres = await fetch(`/poi?bbox=${bbox.join(',')}`,
        { headers: { 'X-Download': '1' } });
      if (!pres.ok) return 0;
      const { pois = [] } = await pres.json();
      if (!pois.length) return 0;
      await savePois(regionId, pois);
      allPois = allPois.concat(pois.map(p => ({ ...p, regionId })));
      renderPoiStat();
      populateFilter();
      return pois.length;
    } catch (err) {
      console.error('POI fetch failed:', err);
      return 0;
    }
  }

  document.getElementById('downloadBtn').onclick = async () => {
    const maxZoom = +document.getElementById('zMax').value;
    if (maxZoom < MIN_ZOOM) return;
    const minZoom = MIN_ZOOM;
    const bbox = currentBbox();
    const id = crypto.randomUUID();
    const status = document.getElementById('status');
    status.textContent = 'downloading POIs…';
    const poiCount = await fetchAndSavePois(id, bbox);
    const extraUrls = [];
    const reg = await navigator.serviceWorker.ready;
    const onMsg = (e) => {
      if (e.data.id !== id) return;
      if (e.data.type === 'progress') {
        status.textContent = `downloading ${e.data.done}/${e.data.total}${e.data.failed ? ` (${e.data.failed} failed)` : ''}`;
      } else if (e.data.type === 'done') {
        status.textContent = `saved ${e.data.done - e.data.failed} tiles, ${poiCount} POIs (${e.data.failed} failed)`;
        const list = loadRegions();
        list.push({
          id, createdAt: Date.now(), bbox, minZoom, maxZoom,
          tileCount: e.data.done - e.data.failed, urls: e.data.urls,
          poiCount
        });
        saveRegions(list);
        renderRegions();
        updateAppDataLabel();
        requestPersistent();
        const src = map.getSource('local');
        if (src && src.setTiles) src.setTiles([location.origin + '/tiles/{z}/{x}/{y}.pbf']);
        navigator.serviceWorker.removeEventListener('message', onMsg);
      }
    };
    navigator.serviceWorker.addEventListener('message', onMsg);
    reg.active.postMessage({ type: 'download', bbox, minZoom, maxZoom, id, extraUrls });
  };

  const FONTS_MB = 3.7;
  const ICONS_MB = 0.9;
  const POI_MB_PER_REGION = 1.0;
  function updateAppDataLabel() {
    const btn = document.getElementById('appDataBtn');
    const fontsCached = localStorage.getItem('cc.fontsDownloaded') === '1';
    const iconsCached = localStorage.getItem('cc.iconsDownloaded') === '1';
    const total = (fontsCached ? 0 : FONTS_MB) + (iconsCached ? 0 : ICONS_MB);
    btn.textContent = total === 0
      ? '↓ app data (up to date)'
      : `↓ app data (~${total.toFixed(1)} MB)`;
  }
  updateAppDataLabel();

  document.getElementById('appDataBtn').onclick = async () => {
    const btn = document.getElementById('appDataBtn');
    const status = document.getElementById('status');
    btn.disabled = true;
    status.textContent = 'fetching font list…';
    const fontUrls = await getFontUrls();
    let fontDone = 0;
    const fontQueue = fontUrls.slice();
    const fontWorkers = Array(6).fill(0).map(async () => {
      while (fontQueue.length) {
        const url = fontQueue.pop();
        try { await fetch(url, { headers: { 'X-Download': '1' } }); } catch {}
        fontDone++;
        if (fontDone % 10 === 0) {
          status.textContent = `fonts ${fontDone}/${fontUrls.length}`;
        }
      }
    });
    await Promise.all(fontWorkers);
    status.textContent = `fonts: ${fontDone}/${fontUrls.length}`;
    if (fontDone === fontUrls.length && fontUrls.length > 0) {
      localStorage.setItem('cc.fontsDownloaded', '1');
    }

    status.textContent = 'downloading icons…';
    const iconCount = await loadAllIcons({ download: true });
    status.textContent = `icons: ${iconCount}`;
    if (iconCount > 0) localStorage.setItem('cc.iconsDownloaded', '1');

    updateAppDataLabel();
    requestPersistent();
    status.textContent = 'app data ready';
    btn.disabled = false;
    map.setStyle(map.getStyle());
  };
})();
</script>

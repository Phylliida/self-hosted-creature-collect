  let walkGraph = { nodes: new Map(), adj: new Map() };

  async function fetchAndSaveWalkGraph(regionId, bbox, statusEl) {
    try {
      if (statusEl) statusEl.textContent = 'walk graph: downloading…';
      const res = await fetch(`/walk-graph?bbox=${bbox.join(',')}`,
        { headers: { 'X-Download': '1' } });
      if (!res.ok) return 0;
      const total = +(res.headers.get('content-length') || 0);
      const reader = res.body.getReader();
      const chunks = [];
      let received = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        received += value.length;
        if (statusEl) {
          const mb = (received / 1048576).toFixed(1);
          statusEl.textContent = total
            ? `walk graph: ${(received / total * 100).toFixed(0)}% (${mb} MB)`
            : `walk graph: ${mb} MB`;
        }
      }
      if (statusEl) statusEl.textContent = 'walk graph: parsing…';
      const blob = new Blob(chunks);
      const text = await blob.text();
      const { nodes = [], edges = [], names = [] } = JSON.parse(text);
      // Decode each shape's base64 to Uint8Array now, once, before IDB put.
      // IDB structured-clones typed arrays natively, and we keep them binary
      // in RAM forever after — no UTF-16 tax on base64 strings.
      for (const e of edges) {
        if (e[4]) e[4] = base64ToBytes(e[4]);
      }
      if (statusEl) statusEl.textContent = `walk graph: saving (${nodes.length.toLocaleString()} nodes)…`;
      await saveWalkGraph(regionId, nodes, edges, names);
      return nodes.length;
    } catch (err) {
      console.error('walk-graph fetch failed:', err);
      return 0;
    }
  }

  function decodeZigzagVarints(bytes) {
    const out = [];
    let i = 0;
    while (i < bytes.length) {
      let val = 0, shift = 0;
      while (true) {
        const b = bytes[i++];
        val |= (b & 0x7F) << shift;
        if ((b & 0x80) === 0) break;
        shift += 7;
      }
      // zigzag decode: (val >>> 1) ^ -(val & 1)
      out.push((val >>> 1) ^ -(val & 1));
    }
    return out;
  }
  function decodeShapeBlob(fromLng, fromLat, bytes) {
    if (!bytes) return [];
    const deltas = decodeZigzagVarints(bytes);
    const pts = [];
    let lngU = Math.round(fromLng * 1e6);
    let latU = Math.round(fromLat * 1e6);
    for (let i = 0; i + 1 < deltas.length; i += 2) {
      lngU += deltas[i];
      latU += deltas[i + 1];
      pts.push([lngU / 1e6, latU / 1e6]);
    }
    return pts;
  }
  // GTFS shape blob: first pair is absolute lat/lng in microdegrees, subsequent
  // pairs are deltas. Returns array of [lng, lat].
  function decodeGtfsShapeBlob(b64) {
    if (!b64) return [];
    const bytes = base64ToBytes(b64);
    const vals = decodeZigzagVarints(bytes);
    if (vals.length < 2) return [];
    const pts = [];
    let latU = vals[0], lngU = vals[1];
    pts.push([lngU / 1e6, latU / 1e6]);
    for (let i = 2; i + 1 < vals.length; i += 2) {
      latU += vals[i];
      lngU += vals[i + 1];
      pts.push([lngU / 1e6, latU / 1e6]);
    }
    return pts;
  }
  // Find the nearest shape vertex to a target lng/lat.
  function nearestShapeIdx(shape, lng, lat) {
    let best = 0, bestD = Infinity;
    for (let i = 0; i < shape.length; i++) {
      const dLng = shape[i][0] - lng;
      const dLat = shape[i][1] - lat;
      const d = dLng * dLng + dLat * dLat;
      if (d < bestD) { bestD = d; best = i; }
    }
    return best;
  }
  // Slice a GTFS shape polyline between two stop coords. The returned polyline
  // starts exactly at stopA, passes through all shape vertices between the two
  // projections, and ends exactly at stopB. Auto-reverses if the alighting
  // stop's projection is upstream of the boarding stop's (rare but possible).
  function clipShapeBetweenStops(shape, stopA, stopB) {
    if (!shape || shape.length < 2) return null;
    const iA = nearestShapeIdx(shape, stopA.lng, stopA.lat);
    const iB = nearestShapeIdx(shape, stopB.lng, stopB.lat);
    const lo = Math.min(iA, iB), hi = Math.max(iA, iB);
    const middle = shape.slice(lo + 1, hi);  // vertices strictly between
    if (iA > iB) middle.reverse();
    return [[stopA.lng, stopA.lat], ...middle, [stopB.lng, stopB.lat]];
  }

  const WALK_SPEED_MPS = 1.3;  // converts walk-edge meters → seconds

  async function rebuildWalkGraph() {
    const groups = await loadAllWalkGraphs();
    walkGraph = { nodes: new Map(), adj: new Map() };
    for (const g of groups) {
      const names = g.names || [];
      for (const [id, lng, lat] of (g.nodes || [])) {
        if (!walkGraph.nodes.has(id)) walkGraph.nodes.set(id, { lng, lat });
      }
      for (const e of (g.edges || [])) {
        const [from, to, weight, nameIdx, shape] = e;
        // `shape` here is either a Uint8Array or null (or any falsy).
        const name = (typeof nameIdx === 'number') ? (names[nameIdx] || '') : (nameIdx || '');
        const walkSec = weight / WALK_SPEED_MPS;
        if (!walkGraph.adj.has(from)) walkGraph.adj.set(from, []);
        walkGraph.adj.get(from).push({ to, weight, walkSec, name, shape: shape || null, reverse: false });
        if (!walkGraph.adj.has(to)) walkGraph.adj.set(to, []);
        walkGraph.adj.get(to).push({ to: from, weight, walkSec, name, shape: shape || null, reverse: true });
      }
    }
    // Bridges depend on both walk graph AND schedule; rebuild whenever walk changes.
    if (typeof buildMultimodalBridges === 'function') buildMultimodalBridges();
    walkGraphLoaded = true;
  }

  // Lazy load: the walk graph is memory-heavy (80-120 MB live for a country-
  // sized region), and nothing on the map except routing / findNearestWalkNode
  // actually reads it. First call triggers a load; subsequent calls are cheap.
  let walkGraphLoaded = false;
  let walkGraphLoadPromise = null;
  async function ensureWalkGraph() {
    if (walkGraphLoaded) return;
    if (!walkGraphLoadPromise) walkGraphLoadPromise = rebuildWalkGraph();
    await walkGraphLoadPromise;
    walkGraphLoadPromise = null;
  }
  // Drop the in-memory graph so iOS can reclaim it during long idle periods.
  // Next routing call will re-hydrate via ensureWalkGraph().
  function unloadWalkGraph() {
    walkGraph = { nodes: new Map(), adj: new Map() };
    walkGraphLoaded = false;
    if (typeof buildMultimodalBridges === 'function') buildMultimodalBridges();
  }

  function haversineM(lng1, lat1, lng2, lat2) {
    const R = 6371000;
    const toRad = (d) => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLng = toRad(lng2 - lng1);
    const a = Math.sin(dLat / 2) ** 2
      + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(a));
  }

  function findNearestWalkNode(lng, lat) {
    let best = null, bestD = Infinity;
    for (const [id, n] of walkGraph.nodes) {
      const d = haversineM(n.lng, n.lat, lng, lat);
      if (d < bestD) { bestD = d; best = id; }
    }
    return { id: best, distance: bestD };
  }

  // Binary heap min-priority-queue for A*
  class MinHeap {
    constructor() { this.a = []; }
    get size() { return this.a.length; }
    push(item) {
      this.a.push(item);
      let i = this.a.length - 1;
      while (i > 0) {
        const p = (i - 1) >> 1;
        if (this.a[p][0] <= this.a[i][0]) break;
        [this.a[p], this.a[i]] = [this.a[i], this.a[p]];
        i = p;
      }
    }
    pop() {
      const top = this.a[0];
      const last = this.a.pop();
      if (this.a.length) {
        this.a[0] = last;
        let i = 0;
        while (true) {
          const l = 2 * i + 1, r = 2 * i + 2;
          let s = i;
          if (l < this.a.length && this.a[l][0] < this.a[s][0]) s = l;
          if (r < this.a.length && this.a[r][0] < this.a[s][0]) s = r;
          if (s === i) break;
          [this.a[s], this.a[i]] = [this.a[i], this.a[s]];
          i = s;
        }
      }
      return top;
    }
  }

  // Bind the pure-Dijkstra planner (static/trip-planner.js) to our mutable
  // walkGraph + scheduleIdx. Getters keep references fresh across rebuilds.
  tripPlanner = TripPlanner.create({
    get walkGraph()   { return walkGraph;   },
    get scheduleIdx() { return scheduleIdx; },
    MinHeap,
  });

  function astar(startId, goalId) {
    if (!walkGraph.nodes.has(startId) || !walkGraph.nodes.has(goalId)) return null;
    const goal = walkGraph.nodes.get(goalId);
    const gScore = new Map();
    const came = new Map();
    const edgeUsed = new Map();
    gScore.set(startId, 0);
    const open = new MinHeap();
    open.push([0, startId]);
    let iter = 0;
    while (open.size) {
      iter++;
      if (iter > 500000) return null;
      const [_, current] = open.pop();
      if (current === goalId) {
        const path = [current];
        const edges = [];
        let c = current;
        while (came.has(c)) {
          const prev = came.get(c);
          edges.unshift(edgeUsed.get(c));
          c = prev;
          path.unshift(c);
        }
        const total = gScore.get(goalId);
        return { path, edges, distance: total };
      }
      const neighbors = walkGraph.adj.get(current) || [];
      const curG = gScore.get(current);
      for (const e of neighbors) {
        const tentative = curG + e.weight;
        if (tentative < (gScore.get(e.to) ?? Infinity)) {
          came.set(e.to, current);
          edgeUsed.set(e.to, e);
          gScore.set(e.to, tentative);
          const nb = walkGraph.nodes.get(e.to);
          const h = nb ? haversineM(nb.lng, nb.lat, goal.lng, goal.lat) : 0;
          open.push([tentative + h, e.to]);
        }
      }
    }
    return null;
  }

  function buildRouteCoords(route) {
    const coords = [];
    if (!route || !route.path.length) return coords;
    const first = walkGraph.nodes.get(route.path[0]);
    if (first) coords.push([first.lng, first.lat]);
    for (let i = 0; i < route.edges.length; i++) {
      const e = route.edges[i];
      const fromN = walkGraph.nodes.get(route.path[i]);
      const toN = walkGraph.nodes.get(route.path[i + 1]);
      if (!fromN || !toN) continue;
      if (e.shape) {
        // Shape encoded from the "physical" edge direction (from lower-node to higher-node
        // based on how it was stored). `reverse` tells us whether our traversal is
        // opposite to that stored direction.
        const origin = e.reverse ? toN : fromN;
        let pts = decodeShapeBlob(origin.lng, origin.lat, e.shape);
        if (e.reverse) pts = pts.reverse();
        for (const p of pts) coords.push(p);
      }
      coords.push([toN.lng, toN.lat]);
    }
    return coords;
  }


  function buildMultimodalCoords(route) {
    // For each leg, emit a pair {coords, style} so the renderer can draw them distinctly.
    const styled = [];
    for (const leg of route.legs) {
      if (leg.type === 'walk') {
        const coords = [];
        for (let i = 0; i < leg.edges.length; i++) {
          const { edge, fromNode, toNode } = leg.edges[i];
          const fromN = walkGraph.nodes.get(fromNode);
          const toN = walkGraph.nodes.get(toNode);
          if (!fromN || !toN) continue;
          if (i === 0) coords.push([fromN.lng, fromN.lat]);
          if (edge.shape) {
            const origin = edge.reverse ? toN : fromN;
            let pts = decodeShapeBlob(origin.lng, origin.lat, edge.shape);
            if (edge.reverse) pts = pts.reverse();
            for (const p of pts) coords.push(p);
          }
          coords.push([toN.lng, toN.lat]);
        }
        styled.push({ kind: 'walk', coords });
      } else if (leg.type === 'access' || leg.type === 'egress') {
        const stop = scheduleIdx.stops.get(leg.stopId);
        const nid = leg.type === 'access' ? leg.fromNode : leg.toNode;
        const n = walkGraph.nodes.get(nid);
        if (stop && n) {
          styled.push({ kind: 'walk', coords: leg.type === 'access'
            ? [[n.lng, n.lat], [stop.lng, stop.lat]]
            : [[stop.lng, stop.lat], [n.lng, n.lat]] });
        }
      } else if (leg.type === 'transit') {
        const from = scheduleIdx.stops.get(leg.fromStopId);
        const to = scheduleIdx.stops.get(leg.toStopId);
        if (from && to) {
          const colour = /^#[0-9a-f]{3,8}$/i.test(leg.route?.colour || '') ? leg.route.colour : '#e89035';
          let coords = null;
          // Prefer the GTFS shape — the authoritative vehicle polyline.
          // scheduleIdx.shapeByPattern is rebuilt on load and works even for
          // saved-route plans whose trip lost its `_getShape` after JSON.
          const shape = scheduleIdx.shapeByPattern?.get(leg.patternId)
            || (leg.trip && typeof leg.trip._getShape === 'function'
                  ? leg.trip._getShape() : null);
          if (shape && shape.length >= 2) {
            coords = clipShapeBetweenStops(shape, from, to);
          }
          if (!coords || coords.length < 2) {
            // Fallback (trips without a GTFS shape, e.g. older IDB data):
            // draw straight lines through each in-bbox stop on the pattern.
            // Much faster than per-pair A* and still much better than a
            // single straight line from boarding to alighting.
            const bboxStops = scheduleIdx.patternBboxStops.get(leg.patternId) || [];
            coords = [];
            for (const [seq, stopId] of bboxStops) {
              if (seq < leg.fromSeq || seq > leg.toSeq) continue;
              const stop = scheduleIdx.stops.get(stopId);
              if (stop) coords.push([stop.lng, stop.lat]);
            }
            if (coords.length < 2) {
              coords = [[from.lng, from.lat], [to.lng, to.lat]];
            }
          }
          styled.push({ kind: 'transit', coords, colour });
        }
      }
    }
    return styled;
  }

  function fmtClockTime(sec) {
    sec = ((sec % 86400) + 86400) % 86400;
    const h = Math.floor(sec / 3600) % 24;
    const m = Math.floor((sec % 3600) / 60);
    if (useClockFormat() === '12h') {
      const ampm = h < 12 ? 'AM' : 'PM';
      const h12 = h % 12 === 0 ? 12 : h % 12;
      return `${h12}:${String(m).padStart(2, '0')} ${ampm}`;
    }
    return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
  }
  function fmtDuration(sec) {
    const m = Math.round(sec / 60);
    if (m < 60) return `${m} min`;
    return `${Math.floor(m / 60)}h ${m % 60}m`;
  }

  // Extract every in-bbox stop on each transit leg (inclusive of boarding + alighting).
  // Returns array of { lng, lat, name, colour, role, legIdx } for map rendering.
  function collectTripStops(route) {
    const out = [];
    route.legs.forEach((leg, legIdx) => {
      if (leg.type !== 'transit') return;
      const bboxStops = scheduleIdx.patternBboxStops.get(leg.patternId) || [];
      const colour = /^#[0-9a-f]{3,8}$/i.test(leg.route?.colour || '') ? leg.route.colour : '#e89035';
      for (const [seq, stopId] of bboxStops) {
        if (seq < leg.fromSeq || seq > leg.toSeq) continue;
        const stop = scheduleIdx.stops.get(stopId);
        if (!stop) continue;
        const role = seq === leg.fromSeq ? 'board'
          : seq === leg.toSeq ? 'alight' : 'pass';
        out.push({
          lng: stop.lng, lat: stop.lat, name: stop.name || '',
          colour, role, legIdx,
        });
      }
    });
    return out;
  }

  // For each transit leg, compute per-intermediate-stop name + arrival time.
  // `arr_seq = leg.tDep + (cum[seq] - cum[fromSeq])` — same offset folds out.
  function legStopCounts(route) {
    return route.legs.map((leg) => {
      if (leg.type !== 'transit') return null;
      const cum = tripCumulative(leg.trip);
      const fromCum = cum[leg.fromSeq] || 0;
      const bboxStops = scheduleIdx.patternBboxStops.get(leg.patternId) || [];
      const intermediate = [];
      for (const [seq, stopId] of bboxStops) {
        if (seq <= leg.fromSeq || seq >= leg.toSeq) continue;
        const stop = scheduleIdx.stops.get(stopId);
        intermediate.push({ name: stop?.name || '', arr: leg.tDep + ((cum[seq] || 0) - fromCum) });
      }
      const totalStops = leg.toSeq - leg.fromSeq;
      return { intermediate, totalStops };
    });
  }

  // Totals for the top-of-step-list breakdown row.
  function tripTotalsHtml(route) {
    let walkSec = 0, walkMeters = 0, transitSec = 0;
    for (const leg of route.legs) {
      const dur = leg.tArr - leg.tDep;
      if (leg.type === 'transit') {
        transitSec += dur;
      } else if (leg.type === 'walk') {
        walkSec += dur;
        for (const { edge } of leg.edges) walkMeters += edge.weight;
      } else {  // access / egress
        walkSec += dur;
        walkMeters += leg.distance || 0;
      }
    }
    const waitSec = Math.max(0, (route.endSec - route.startSec) - walkSec - transitSec);
    const parts = [];
    if (walkSec > 0 || walkMeters > 0) {
      parts.push(`<span class="part">🚶 ${fmtDuration(walkSec)} · ${Math.round(walkMeters)} m</span>`);
    }
    if (transitSec > 0) parts.push(`<span class="part">🚌 ${fmtDuration(transitSec)}</span>`);
    if (waitSec > 0)    parts.push(`<span class="part">⏱ ${fmtDuration(waitSec)} waiting</span>`);
    return parts.length ? `<div class="summary-breakdown">${parts.join('')}</div>` : '';
  }

  function multimodalInstructions(route) {
    const stopCounts = legStopCounts(route);
    const pivot = route.pivotDate ? new Date(route.pivotDate) : new Date();
    const userGtfsIdx = todayInfo(pivot).gtfsIdx;
    const steps = [];
    route.legs.forEach((leg, legIdx) => {
      if (leg.type === 'walk') {
        let meters = 0;
        for (const { edge } of leg.edges) meters += edge.weight;
        steps.push({ kind: 'walk', text: `Walk ${Math.round(meters)} m`,
                     dep: leg.tDep, arr: leg.tArr });
      } else if (leg.type === 'access') {
        const stop = scheduleIdx.stops.get(leg.stopId);
        steps.push({ kind: 'walk', text: `Walk ${Math.round(leg.distance)} m to ${stop?.name || 'stop'}`,
                     dep: leg.tDep, arr: leg.tArr });
      } else if (leg.type === 'egress') {
        const stop = scheduleIdx.stops.get(leg.stopId);
        steps.push({ kind: 'walk', text: `Walk ${Math.round(leg.distance)} m from ${stop?.name || 'stop'}`,
                     dep: leg.tDep, arr: leg.tArr });
      } else if (leg.type === 'transit') {
        const ref = leg.route?.short || '?';
        const long = leg.route?.long || '';
        const from = scheduleIdx.stops.get(leg.fromStopId)?.name || '';
        const to = scheduleIdx.stops.get(leg.toStopId)?.name || '';
        const counts = stopCounts[legIdx];
        steps.push({
          kind: 'transit',
          ref, long,
          colour: leg.route?.colour || '',
          fromName: from, toName: to,
          dep: leg.tDep, arr: leg.tArr,
          durationSec: leg.tArr - leg.tDep,
          totalStops: counts?.totalStops || 0,
          intermediateStops: counts?.intermediate || [],  // [{name, arr}]
          patternId: leg.patternId,
          fromStopId: leg.fromStopId,
          fromSeq: leg.fromSeq,
          userGtfsIdx,
          text: `${ref} ${leg.trip.h || long} — board ${from} ${fmtClockTime(leg.tDep)}, alight ${to} ${fmtClockTime(leg.tArr)} (${fmtDuration(leg.tArr - leg.tDep)})`,
        });
      }
    });
    return steps;
  }

  function bearingDeg(a, b) {
    const toRad = (d) => d * Math.PI / 180;
    const y = Math.sin(toRad(b.lng - a.lng)) * Math.cos(toRad(b.lat));
    const x = Math.cos(toRad(a.lat)) * Math.sin(toRad(b.lat))
      - Math.sin(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.cos(toRad(b.lng - a.lng));
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
  }

  function instructionsFor(route) {
    if (!route || route.path.length < 2) return [];
    const steps = [];
    let curName = route.edges[0] ? route.edges[0].name : '';
    let curDist = 0;
    let lastBearing = null;
    for (let i = 0; i < route.edges.length; i++) {
      const e = route.edges[i];
      const fromN = walkGraph.nodes.get(route.path[i]);
      const toN = walkGraph.nodes.get(route.path[i + 1]);
      const bearing = bearingDeg(fromN, toN);
      const name = e.name || '';
      if (i === 0) {
        steps.push({ action: 'start', name, distance: 0 });
        lastBearing = bearing;
        curDist = e.weight;
        curName = name;
        continue;
      }
      const nameChanged = name && curName && name !== curName;
      const turnDelta = ((bearing - lastBearing + 540) % 360) - 180;
      const sharp = Math.abs(turnDelta) > 30;
      if (nameChanged || sharp) {
        steps[steps.length - 1].distance += curDist;
        const dir = turnDelta > 30 ? 'turn right' : turnDelta < -30 ? 'turn left' : 'continue';
        steps.push({ action: dir, name, distance: 0 });
        curDist = e.weight;
        curName = name;
      } else {
        curDist += e.weight;
      }
      lastBearing = bearing;
    }
    if (steps.length) steps[steps.length - 1].distance += curDist;
    steps.push({ action: 'arrive', name: '', distance: 0 });
    return steps;
  }

  async function fetchAndSaveRoutes(regionId, bbox) {
    try {
      const res = await fetch(`/routes?bbox=${bbox.join(',')}`,
        { headers: { 'X-Download': '1' } });
      if (!res.ok) return 0;
      const geo = await res.json();
      const features = geo.features || [];
      const routesMeta = geo.routes || {};
      const stopsMap = geo.stops || {};
      await saveRoutes(regionId, features, routesMeta, stopsMap);
      return features.length;
    } catch (err) {
      console.error('routes fetch failed:', err);
      return 0;
    }
  }
  async function fetchAndSaveSchedule(regionId, bbox) {
    try {
      const res = await fetch(`/schedule?bbox=${bbox.join(',')}`,
        { headers: { 'X-Download': '1' } });
      if (!res.ok) return 0;
      const payload = await res.json();
      await saveSchedule(regionId, payload);
      return Object.keys(payload.stops || {}).length;
    } catch (err) {
      console.error('schedule fetch failed:', err);
      return 0;
    }
  }

  async function prefetchBaseMap(statusEl) {
    const id = crypto.randomUUID();
    const reg = await navigator.serviceWorker.ready;
    await new Promise((resolve) => {
      const onMsg = (e) => {
        if (!e.data || e.data.id !== id) return;
        if (e.data.type === 'progress') {
          if (statusEl) statusEl.textContent =
            `base map ${e.data.done}/${e.data.total}`;
        } else if (e.data.type === 'done') {
          navigator.serviceWorker.removeEventListener('message', onMsg);
          if (statusEl) statusEl.textContent =
            `base map: ${e.data.done - e.data.failed}/${e.data.total}`;
          localStorage.setItem('cc.baseMapDownloaded', '1');
          resolve();
        }
      };
      navigator.serviceWorker.addEventListener('message', onMsg);
      reg.active.postMessage({
        type: 'download',
        bbox: [-180, -85, 180, 85],
        minZoom: 0, maxZoom: BASE_MAP_MAX_ZOOM,
        id, extraUrls: []
      });
    });
  }

  const STOP_GRID = 1000;
  let stopGrid = new Map();
  function stopGridKey(lng, lat) {
    return Math.round(lng * STOP_GRID) + ',' + Math.round(lat * STOP_GRID);
  }
  function haversineMeters(lng1, lat1, lng2, lat2) {
    const R = 6371000;
    const toRad = (d) => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
    const a = Math.sin(dLat / 2) ** 2
      + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(a));
  }
  function rebuildStopGrid() {
    stopGrid = new Map();
    for (const [rid, m] of Object.entries(routeMetaIndex)) {
      const stops = m.stops || [];
      for (const s of stops) {
        const k = stopGridKey(s.lng, s.lat);
        if (!stopGrid.has(k)) stopGrid.set(k, []);
        stopGrid.get(k).push({ rid, ...s });
      }
    }
  }
  function findStopsNear(lng, lat, maxMeters) {
    const out = [];
    const cx = Math.round(lng * STOP_GRID);
    const cy = Math.round(lat * STOP_GRID);
    for (let dx = -1; dx <= 1; dx++) {
      for (let dy = -1; dy <= 1; dy++) {
        const cell = stopGrid.get((cx + dx) + ',' + (cy + dy));
        if (!cell) continue;
        for (const s of cell) {
          const d = haversineMeters(lng, lat, s.lng, s.lat);
          if (d <= maxMeters) out.push({ ...s, distance: d });
        }
      }
    }
    return out;
  }

  function base64ToBytes(b64) {
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }
  function unpackVarints(bytes) {
    const out = [];
    let i = 0;
    while (i < bytes.length) {
      let v = 0, shift = 0;
      while (true) {
        const b = bytes[i++];
        v |= (b & 0x7F) << shift;
        if ((b & 0x80) === 0) break;
        shift += 7;
      }
      out.push(v);
    }
    return out;
  }
  const timingCumCache = new Map();  // base64 blob -> cumulative offsets
  function tripCumulative(trip) {
    const key = trip.t;
    let cum = timingCumCache.get(key);
    if (cum) return cum;
    const bytes = base64ToBytes(key || '');
    const deltas = unpackVarints(bytes);
    cum = new Array(deltas.length + 1);
    cum[0] = 0;
    for (let i = 0; i < deltas.length; i++) cum[i + 1] = cum[i] + deltas[i];
    timingCumCache.set(key, cum);
    return cum;
  }

  let scheduleIdx = {
    osmToGtfs: new Map(),
    stopPatterns: new Map(),
    patterns: new Map(),
    tripsByPattern: new Map(),
    routesById: new Map(),
    services: new Map(),
    serviceExceptions: [],
    stops: new Map(),              // gtfs_stop_id -> {lng, lat, name}
    patternBboxStops: new Map(),   // pattern_id -> [[seq, stop_id], ...] sorted by seq
    stopToWalkNode: new Map(),     // gtfs_stop_id -> {nodeId, distance}
    walkNodeToStops: new Map(),    // walk_node_id -> [[stop_id, distance], ...]
  };
  async function rebuildScheduleIndex() {
    const idx = {
      osmToGtfs: new Map(), stopPatterns: new Map(),
      patterns: new Map(), tripsByPattern: new Map(),
      routesById: new Map(), services: new Map(), serviceExceptions: [],
      stops: new Map(), patternBboxStops: new Map(),
      stopToWalkNode: new Map(), walkNodeToStops: new Map(),
    };
    timingCumCache.clear();
    const all = await loadAllSchedules();
    for (const region of all) {
      for (const [gid, stop] of Object.entries(region.stops || {})) {
        if (!idx.stops.has(gid)) {
          idx.stops.set(gid, { lng: stop.lng, lat: stop.lat, name: stop.name || '' });
        }
        for (const onid of (stop.osm_nodes || [])) {
          if (!idx.osmToGtfs.has(onid)) idx.osmToGtfs.set(onid, new Set());
          idx.osmToGtfs.get(onid).add(gid);
        }
      }
      for (const [gid, pairs] of Object.entries(region.stop_patterns || {})) {
        let arr = idx.stopPatterns.get(gid);
        if (!arr) { arr = []; idx.stopPatterns.set(gid, arr); }
        for (const p of pairs) arr.push(p);
      }
      for (const [pidStr, pat] of Object.entries(region.patterns || {})) {
        idx.patterns.set(Number(pidStr), {
          route_id: pat.route_id, stop_count: pat.stop_count,
        });
      }
      for (const [rid, r] of Object.entries(region.routes || {})) {
        idx.routesById.set(rid, r);
      }
      const timings = region.timings || [];
      const headsigns = region.headsigns || [];
      const services = region.services || [];
      const shapeBlobs = region.shapes || [];
      // Lazy-decoded per-index cache.
      const decodedShapes = new Array(shapeBlobs.length);
      for (const svc of services) {
        if (svc && svc.id) idx.services.set(svc.id, svc);
      }
      for (const [svcIdx, date, et] of (region.service_exceptions || [])) {
        const svc = services[svcIdx];
        if (svc) idx.serviceExceptions.push([svc.id, date, et]);
      }
      const getShape = (idx_) => {
        if (idx_ == null || idx_ < 0 || idx_ >= shapeBlobs.length) return null;
        if (decodedShapes[idx_] === undefined) {
          decodedShapes[idx_] = decodeGtfsShapeBlob(shapeBlobs[idx_]);
        }
        return decodedShapes[idx_];
      };
      for (const row of (region.trips || [])) {
        const [pat_id, timing_id, svc_idx, hs_idx, dir, first_dep, shape_idx] = row;
        const svc = services[svc_idx];
        if (!svc) continue;
        const trip = {
          p: pat_id,
          t: timings[timing_id] || '',
          s: svc.id,
          h: headsigns[hs_idx] || '',
          d: dir,
          f: first_dep,
          shapeIdx: (shape_idx != null && shape_idx >= 0) ? shape_idx : null,
          _getShape: shape_idx != null && shape_idx >= 0
            ? () => getShape(shape_idx)
            : () => null,
        };
        let arr = idx.tripsByPattern.get(pat_id);
        if (!arr) { arr = []; idx.tripsByPattern.set(pat_id, arr); }
        arr.push(trip);
      }
    }
    // Build pattern -> [seq, stop_id] sorted list (only in-bbox stops)
    for (const [stopId, pairs] of idx.stopPatterns) {
      for (const [patId, seq] of pairs) {
        if (!idx.patternBboxStops.has(patId)) idx.patternBboxStops.set(patId, []);
        idx.patternBboxStops.get(patId).push([seq, stopId]);
      }
    }
    for (const arr of idx.patternBboxStops.values()) arr.sort((a, b) => a[0] - b[0]);

    // GTFS-shape lookups for drawing bus-routes polylines from the authoritative source.
    // shapeByPattern: pattern_id -> decoded [lng,lat][] (taken from any trip on the pattern)
    // gtfsRouteByRefMode: "<mode>:<normRef>" -> Set<gtfs_route_id>
    idx.shapeByPattern = new Map();
    idx.gtfsRouteByRefMode = new Map();
    for (const [patId, trips] of idx.tripsByPattern) {
      for (const trip of trips) {
        if (typeof trip._getShape === 'function') {
          const s = trip._getShape();
          if (s && s.length >= 2) { idx.shapeByPattern.set(patId, s); break; }
        }
      }
    }
    const gtfsModeToOsm = (m) => (
      m === 0 || m === 5 ? 'tram' :
      m === 1 ? 'subway' :
      m === 2 ? 'rail' :
      m === 3 ? 'bus' :
      m === 4 ? 'ferry' :
      m === 11 ? 'trolleybus' :
      m === 12 ? 'monorail' :
      ''
    );
    for (const [gtfsRid, info] of idx.routesById) {
      const refNorm = String(info.short || info.long || '').trim().toLowerCase();
      if (!refNorm) continue;
      const osmMode = gtfsModeToOsm(info.mode);
      if (!osmMode) continue;
      const k = `${osmMode}:${refNorm}`;
      if (!idx.gtfsRouteByRefMode.has(k)) idx.gtfsRouteByRefMode.set(k, new Set());
      idx.gtfsRouteByRefMode.get(k).add(gtfsRid);
    }

    scheduleIdx = idx;
    buildMultimodalBridges();
    rebuildTransitFromSchedule();
    await refreshRoutesSource();
    if (typeof renderTransitModes  === 'function') renderTransitModes();
    if (typeof renderTransitRoutes === 'function') renderTransitRoutes();
  }

  function buildMultimodalBridges() {
    scheduleIdx.stopToWalkNode = new Map();
    scheduleIdx.walkNodeToStops = new Map();
    if (!walkGraph || !walkGraph.nodes.size || !scheduleIdx.stops.size) return;
    const GRID = 1000;  // ~100m buckets at equator
    const walkGrid = new Map();
    for (const [id, n] of walkGraph.nodes) {
      const k = Math.round(n.lng * GRID) + ',' + Math.round(n.lat * GRID);
      if (!walkGrid.has(k)) walkGrid.set(k, []);
      walkGrid.get(k).push([id, n.lng, n.lat]);
    }
    const MAX_LINK_M = 500;
    for (const [stopId, stop] of scheduleIdx.stops) {
      const cx = Math.round(stop.lng * GRID);
      const cy = Math.round(stop.lat * GRID);
      let best = null, bestD = Infinity;
      for (let dx = -2; dx <= 2; dx++) {
        for (let dy = -2; dy <= 2; dy++) {
          const cell = walkGrid.get((cx + dx) + ',' + (cy + dy));
          if (!cell) continue;
          for (const [id, nlng, nlat] of cell) {
            const d = haversineM(nlng, nlat, stop.lng, stop.lat);
            if (d < bestD) { bestD = d; best = id; }
          }
        }
      }
      if (best !== null && bestD <= MAX_LINK_M) {
        const walkSec = bestD / WALK_SPEED_MPS;
        scheduleIdx.stopToWalkNode.set(stopId, { node: best, walkSec });
        if (!scheduleIdx.walkNodeToStops.has(best)) {
          scheduleIdx.walkNodeToStops.set(best, []);
        }
        scheduleIdx.walkNodeToStops.get(best).push([stopId, walkSec]);
      }
    }
  }
  // Extract wall-clock components of an instant as seen in a given IANA time zone.
  function walltimeInTz(d, tz) {
    const parts = new Intl.DateTimeFormat('en-CA', {
      timeZone: tz,
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      hourCycle: 'h23', weekday: 'short',
    }).formatToParts(d);
    const p = {};
    for (const x of parts) p[x.type] = x.value;
    const wdays = { Sun: 0, Mon: 1, Tue: 2, Wed: 3, Thu: 4, Fri: 5, Sat: 6 };
    return {
      year: +p.year, month: +p.month, day: +p.day,
      hour: +p.hour, minute: +p.minute, second: +p.second,
      jsDay: wdays[p.weekday.slice(0, 3)] ?? 0,
    };
  }
  function todayInfo(now) {
    const w = walltimeInTz(now, useTz());
    const pad = (n) => String(n).padStart(2, '0');
    return {
      dateStr: `${w.year}${pad(w.month)}${pad(w.day)}`,
      gtfsIdx: w.jsDay === 0 ? 6 : w.jsDay - 1,  // GTFS: Mon=0..Sun=6
      nowSec: w.hour * 3600 + w.minute * 60 + w.second,
    };
  }
  function activeServicesForDate(info) {
    const active = new Set();
    for (const [sid, svc] of scheduleIdx.services) {
      if (svc.start && info.dateStr < svc.start) continue;
      if (svc.end && info.dateStr > svc.end) continue;
      if (svc.dow && svc.dow[info.gtfsIdx] === 1) active.add(sid);
    }
    for (const [sid, date, et] of scheduleIdx.serviceExceptions) {
      if (date !== info.dateStr) continue;
      if (et === 1) active.add(sid);
      else if (et === 2) active.delete(sid);
    }
    return active;
  }
  // For a reference date, return service sets for yesterday / today / tomorrow
  // so cross-midnight trips (GTFS times ≥ 24:00 in yesterday's service, or
  // tomorrow's service showing after we span midnight forward) are reachable.
  function expandedServiceSets(refDate) {
    const today = activeServicesForDate(todayInfo(refDate));
    const yd = new Date(refDate); yd.setDate(yd.getDate() - 1);
    const td = new Date(refDate); td.setDate(td.getDate() + 1);
    return {
      today,
      yesterday: activeServicesForDate(todayInfo(yd)),
      tomorrow: activeServicesForDate(todayInfo(td)),
    };
  }
  // Pick the offset (seconds) that turns a trip's raw seconds-since-start-of-service
  // into effective seconds relative to `refDate` midnight. Returns null if the trip
  // doesn't operate on any of the three adjacent days.
  function tripDayOffset(trip, sets) {
    if (sets.today.has(trip.s)) return 0;
    if (sets.yesterday.has(trip.s)) return -86400;
    if (sets.tomorrow.has(trip.s)) return 86400;
    return null;
  }
  // Group every pattern serving any of the given GTFS stop IDs into one
  // row apiece. Each row carries the upcoming few departures (if any), a
  // representative headsign, and the (patternId, stopId, seq) needed to
  // pop open the full schedule modal. Name kept for call-site stability;
  // the inputs are now GTFS stop_ids (what findStopsNear returns).
  function nextDeparturesForOsmNodes(stopIds, now, limitPerPattern = 3) {
    const gtfsStopIds = new Set(stopIds);
    if (!gtfsStopIds.size) return [];
    const info = todayInfo(now);
    const svcSets = expandedServiceSets(now);
    const windowSec = 6 * 3600;
    const groups = new Map();   // key = `${patternId}|${gid}`
    for (const gid of gtfsStopIds) {
      const patternSeqs = scheduleIdx.stopPatterns.get(gid);
      if (!patternSeqs) continue;
      for (const [patternId, seq] of patternSeqs) {
        const pattern = scheduleIdx.patterns.get(patternId);
        if (!pattern) continue;
        const key = `${patternId}|${gid}`;
        if (!groups.has(key)) {
          groups.set(key, {
            patternId, gtfsStopId: gid, seq,
            route: scheduleIdx.routesById.get(pattern.route_id),
            headsign: '',
            departures: [],
          });
        }
        const g = groups.get(key);
        const trips = scheduleIdx.tripsByPattern.get(patternId) || [];
        for (const trip of trips) {
          if (!g.headsign && trip.h) g.headsign = trip.h;
          const off = tripDayOffset(trip, svcSets);
          if (off === null) continue;
          const cum = tripCumulative(trip);
          const dep = trip.f + (cum[seq] || 0) + off;
          if (dep < info.nowSec) continue;
          if (dep - info.nowSec > windowSec) continue;
          g.departures.push({ dep, headsign: trip.h || '' });
        }
      }
    }
    const result = [...groups.values()].map(g => {
      g.departures.sort((a, b) => a.dep - b.dep);
      g.departures = g.departures.slice(0, limitPerPattern);
      return g;
    });
    result.sort((a, b) => {
      const as = parseInt(a.route?.short || '') || 9999;
      const bs = parseInt(b.route?.short || '') || 9999;
      if (as !== bs) return as - bs;
      const ref = (a.route?.short || '').localeCompare(b.route?.short || '');
      if (ref) return ref;
      return a.headsign.localeCompare(b.headsign);
    });
    return result;
  }
  function formatDepartureTime(sec) {
    let h = Math.floor(sec / 3600) % 24;
    const m = Math.floor((sec % 3600) / 60);
    return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
  }

  let viewedRoutes = new Set();
  function refreshStopsSource() {
    const src = map.getSource('route-stops');
    if (!src) return;
    const features = [];
    for (const rid of viewedRoutes) {
      const m = routeMetaIndex[rid];
      if (!m) continue;
      const colour = /^#[0-9a-f]{3,8}$/i.test(m.colour || '') ? m.colour : '#888';
      for (const s of (m.stops || [])) {
        features.push({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [s.lng, s.lat] },
          properties: {
            rid, node_id: s.node_id, name: s.name || '', role: s.role || '',
            ord: s.ord, colour
          }
        });
      }
    }
    src.setData({ type: 'FeatureCollection', features });
  }

  let cachedRouteFeatures = [];
  // Rebuild routeMetaIndex, cachedRouteFeatures, and the stop grid from the
  // current scheduleIdx. `rid` in these structures is now a GTFS route_id.
  // Called whenever rebuildScheduleIndex finishes.
  function rebuildTransitFromSchedule() {
    const gtfsModeToOsm = (m) => (
      m === 0 || m === 5 ? 'tram' :
      m === 1 ? 'subway' :
      m === 2 ? 'rail' :
      m === 3 ? 'bus' :
      m === 4 ? 'ferry' :
      m === 11 ? 'trolleybus' :
      m === 12 ? 'monorail' :
      'bus'
    );
    routeMetaIndex = {};
    cachedRouteFeatures = [];
    if (!scheduleIdx.routesById || !scheduleIdx.routesById.size) {
      rebuildStopGrid();
      return;
    }
    // Group patterns by GTFS route_id.
    const patternsByRoute = new Map();
    for (const [patId, pat] of scheduleIdx.patterns) {
      let arr = patternsByRoute.get(pat.route_id);
      if (!arr) { arr = []; patternsByRoute.set(pat.route_id, arr); }
      arr.push(patId);
    }
    for (const [rid, info] of scheduleIdx.routesById) {
      const rawColour = info.colour || '';
      const colour = rawColour
        ? (rawColour.startsWith('#') ? rawColour : '#' + rawColour)
        : '';
      const patternIds = patternsByRoute.get(rid) || [];
      // Union of stops across every pattern of this route.
      const stopsMap = new Map();
      for (const patId of patternIds) {
        const bboxStops = scheduleIdx.patternBboxStops.get(patId) || [];
        for (const [seq, stopId] of bboxStops) {
          if (stopsMap.has(stopId)) continue;
          const stop = scheduleIdx.stops.get(stopId);
          if (!stop) continue;
          stopsMap.set(stopId, {
            node_id: stopId, lng: stop.lng, lat: stop.lat,
            name: stop.name || '', ord: seq, role: '',
          });
        }
      }
      routeMetaIndex[rid] = {
        rid,
        ref: info.short || '',
        name: info.long || info.short || '',
        mode: gtfsModeToOsm(info.mode),
        colour,
        patterns: patternIds,
        stops: [...stopsMap.values()],
      };
      // One map feature per pattern: prefer shape, fall back to straight
      // lines through this pattern's stops.
      for (const patId of patternIds) {
        const shape = scheduleIdx.shapeByPattern.get(patId);
        let coords = null;
        if (shape && shape.length >= 2) {
          coords = shape;
        } else {
          const pts = (scheduleIdx.patternBboxStops.get(patId) || [])
            .map(([seq, sid]) => scheduleIdx.stops.get(sid))
            .filter(Boolean)
            .map(s => [s.lng, s.lat]);
          if (pts.length >= 2) coords = pts;
        }
        if (!coords) continue;
        cachedRouteFeatures.push({
          type: 'Feature',
          geometry: { type: 'LineString', coordinates: coords },
          properties: { route_ids: [rid], colour: colour || '#e89035', pattern_id: patId },
        });
      }
    }
    rebuildStopGrid();
  }
  // Kept as a no-op for callers; the cache now rebuilds with the schedule.
  function invalidateRoutesCache() {}
  async function refreshRoutesSource() {
    const src = map.getSource('bus-routes');
    if (!src) return;
    const features = [];
    for (const f of cachedRouteFeatures) {
      const rids = f.properties.route_ids;
      let visible = false;
      for (const rid of rids) {
        const meta = routeMetaIndex[rid];
        if (meta && modeOn(meta.mode) && routeOn(rid)) { visible = true; break; }
      }
      if (visible) features.push(f);
    }
    src.setData({ type: 'FeatureCollection', features });
    applyTransitTileVisibility();
  }

  document.getElementById('downloadBtn').onclick = async () => {
    const maxZoom = +document.getElementById('zMax').value;
    if (maxZoom < MIN_ZOOM) return;
    const minZoom = MIN_ZOOM;
    const bbox = currentBbox();
    const id = crypto.randomUUID();
    const status = document.getElementById('status');
    status.textContent = 'downloading POIs…';
    const poiCount = await fetchAndSavePois(id, bbox);
    status.textContent = 'downloading schedules…';
    await fetchAndSaveSchedule(id, bbox);
    await rebuildScheduleIndex();
    await fetchAndSaveWalkGraph(id, bbox, status);
    // Drop any in-memory walk graph so next routing call re-loads and picks
    // up the new region. Lazy — we don't rebuild here.
    unloadWalkGraph();
    const extraUrls = [];
    const reg = await navigator.serviceWorker.ready;
    const onMsg = (e) => {
      if (e.data.id !== id) return;
      if (e.data.type === 'progress') {
        status.textContent = `downloading ${e.data.done}/${e.data.total}${e.data.failed ? ` (${e.data.failed} failed)` : ''}`;
      } else if (e.data.type === 'done') {
        status.textContent = `saved ${e.data.done - e.data.failed} tiles, ${poiCount} POIs (${e.data.failed} failed)`;
        const list = loadRegions();
        list.push({
          id, createdAt: Date.now(), bbox, minZoom, maxZoom,
          tileCount: e.data.done - e.data.failed, urls: e.data.urls,
          poiCount
        });
        saveRegions(list);
        renderRegions();
        updateAppDataLabel();
        requestPersistent();
        const src = map.getSource('local');
        if (src && src.setTiles) src.setTiles([location.origin + '/tiles/{z}/{x}/{y}.pbf']);
        navigator.serviceWorker.removeEventListener('message', onMsg);
      }
    };
    navigator.serviceWorker.addEventListener('message', onMsg);
    reg.active.postMessage({ type: 'download', bbox, minZoom, maxZoom, id, extraUrls });
  };

  const FONTS_MB = 3.7;
  const ICONS_MB = 0.9;
  const POI_MB_PER_REGION = 1.0;
  const BASE_MAP_MAX_ZOOM = 5;
  const BASE_MAP_MB = 3;
  function updateAppDataLabel() {
    const btn = document.getElementById('appDataBtn');
    const fontsCached = localStorage.getItem('cc.fontsDownloaded') === '1';
    const iconsCached = localStorage.getItem('cc.iconsDownloaded') === '1';
    const baseCached = localStorage.getItem('cc.baseMapDownloaded') === '1';
    const total = (fontsCached ? 0 : FONTS_MB)
      + (iconsCached ? 0 : ICONS_MB)
      + (baseCached ? 0 : BASE_MAP_MB);
    btn.textContent = total === 0
      ? '↓ app data (up to date)'
      : `↓ app data (~${total.toFixed(1)} MB)`;
  }
  updateAppDataLabel();

  document.getElementById('appDataBtn').onclick = async () => {
    const btn = document.getElementById('appDataBtn');
    const status = document.getElementById('status');
    btn.disabled = true;
    status.textContent = 'fetching font list…';
    const fontUrls = await getFontUrls();
    let fontDone = 0;
    const fontQueue = fontUrls.slice();
    const fontWorkers = Array(6).fill(0).map(async () => {
      while (fontQueue.length) {
        const url = fontQueue.pop();
        try { await fetch(url, { headers: { 'X-Download': '1' } }); } catch {}
        fontDone++;
        if (fontDone % 10 === 0) {
          status.textContent = `fonts ${fontDone}/${fontUrls.length}`;
        }
      }
    });
    await Promise.all(fontWorkers);
    status.textContent = `fonts: ${fontDone}/${fontUrls.length}`;
    if (fontDone === fontUrls.length && fontUrls.length > 0) {
      localStorage.setItem('cc.fontsDownloaded', '1');
    }

    status.textContent = 'downloading icons…';
    const iconCount = await loadAllIcons({ download: true });
    status.textContent = `icons: ${iconCount}`;
    if (iconCount > 0) localStorage.setItem('cc.iconsDownloaded', '1');

    await prefetchBaseMap(status);

    updateAppDataLabel();
    requestPersistent();
    status.textContent = 'app data ready';
    btn.disabled = false;
    map.setStyle(map.getStyle());
  };
})();
</script>

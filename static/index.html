<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>creature collect</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="/static/icon.svg">
<link rel="apple-touch-icon" href="/static/icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="collect">
<meta name="theme-color" content="#a0c8f0">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<style>
  html, body {
    margin: 0; width: 100%; font-family: system-ui, sans-serif;
    height: 100vh; height: -webkit-fill-available; height: 100dvh;
    overscroll-behavior: none;
  }
  #map { position: absolute; inset: 0; background: #f5f5dc; }
  #install {
    position: absolute; left: 0; right: 0; top: 0; z-index: 20;
    padding: 10px 14px;
    padding-top: calc(10px + env(safe-area-inset-top));
    padding-left: calc(14px + env(safe-area-inset-left));
    padding-right: calc(14px + env(safe-area-inset-right));
    background: #2d2d2d; color: #fff; font-size: 13px; display: none;
  }
  #install.show { display: flex; gap: 10px; align-items: center; }
  #install .msg { flex: 1; }
  #install button { background: transparent; color: #fff; border: 1px solid #fff;
                    border-radius: 4px; padding: 4px 8px; cursor: pointer; }
  #panel {
    position: absolute; left: 8px; right: 8px; z-index: 10;
    bottom: calc(8px + env(safe-area-inset-bottom));
    background: rgba(255,255,255,0.95); border-radius: 8px; padding: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2); max-height: 45vh; overflow: auto;
  }
  #panel button { padding: 8px 12px; font-size: 14px; margin: 2px; cursor: pointer; }
  #panel input { padding: 6px; font-size: 14px; margin: 2px; }
  #status { font-size: 12px; color: #555; margin-top: 4px; }
  .region { display: flex; justify-content: space-between; align-items: center;
            padding: 4px 0; border-top: 1px solid #eee; }
  .region .label { font-size: 13px; }
  .region .meta { font-size: 11px; color: #888; }
  details summary { cursor: pointer; user-select: none; }
  #search {
    position: absolute; top: 0; left: 8px; right: 8px; z-index: 15;
    padding-top: calc(8px + env(safe-area-inset-top));
  }
  #searchInput {
    width: 100%; padding: 10px 12px; font-size: 14px; border: none; border-radius: 6px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2); box-sizing: border-box; background: #fff;
  }
  #searchResults {
    background: #fff; margin-top: 4px; border-radius: 6px;
    max-height: 40vh; overflow-y: auto;
    display: none; box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  #searchResults.show { display: block; }
  .poi-result { padding: 8px 12px; border-bottom: 1px solid #eee; cursor: pointer; }
  .poi-result:last-child { border-bottom: none; }
  .poi-result:active { background: #eef; }
  .poi-result .name { font-size: 14px; }
  .poi-result .cat { font-size: 11px; color: #888; }
</style>
</head>
<body>
<div id="map"></div>
<div id="search">
  <input id="searchInput" type="search" placeholder="search (downloaded regions)"
         autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <div id="searchResults"></div>
</div>
<div id="install">
  <div class="msg">Tap <b>Share</b> → <b>Add to Home Screen</b> so offline tiles aren't evicted.</div>
  <button id="installDismiss">ok</button>
</div>
<div id="panel">
  <details>
    <summary><b>offline maps</b> <span id="offlineBadge"></span></summary>
    <div style="margin-top: 8px;">
      <label>max zoom <input id="zMax" type="number" min="1" max="14" value="14" style="width: 40px;"></label>
      <button id="downloadBtn">↓ save current view</button>
      <div id="status"></div>
      <div id="storage" style="font-size: 11px; color: #888; margin-top: 2px;"></div>
      <div id="poiStat" style="font-size: 11px; color: #888;"></div>
      <div id="regions"></div>
    </div>
  </details>
</div>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent)
  || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
const isStandalone = window.navigator.standalone
  || window.matchMedia('(display-mode: standalone)').matches;
if (isIOS && !isStandalone && localStorage.getItem('cc.installDismissed') !== '1') {
  document.getElementById('install').classList.add('show');
}
document.getElementById('installDismiss').onclick = () => {
  localStorage.setItem('cc.installDismissed', '1');
  document.getElementById('install').classList.remove('show');
};

async function updateStorageInfo() {
  const el = document.getElementById('storage');
  if (!el || !navigator.storage) return;
  const parts = [];
  if (navigator.storage.persisted) {
    parts.push((await navigator.storage.persisted()) ? 'persistent ✓' : 'not persistent');
  }
  if (navigator.storage.estimate) {
    const { usage = 0, quota = 0 } = await navigator.storage.estimate();
    const mb = (n) => (n / 1048576).toFixed(1) + 'MB';
    parts.push(`${mb(usage)} / ${mb(quota)}`);
  }
  el.textContent = parts.join(' · ');
}

async function requestPersistent() {
  if (navigator.storage && navigator.storage.persist) {
    try { await navigator.storage.persist(); } catch {}
  }
  updateStorageInfo();
}
requestPersistent();

const POI_DB_NAME = 'cc.pois.v1';
function openPoiDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(POI_DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains('pois')) {
        const store = db.createObjectStore('pois', { autoIncrement: true });
        store.createIndex('regionId', 'regionId');
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function savePois(regionId, pois) {
  if (!pois.length) return;
  const db = await openPoiDB();
  const tx = db.transaction('pois', 'readwrite');
  const store = tx.objectStore('pois');
  for (const p of pois) store.put({ ...p, regionId });
  await new Promise((r, j) => { tx.oncomplete = r; tx.onerror = () => j(tx.error); });
  db.close();
}
async function loadAllPois() {
  const db = await openPoiDB();
  return new Promise((resolve, reject) => {
    const req = db.transaction('pois', 'readonly').objectStore('pois').getAll();
    req.onsuccess = () => { resolve(req.result); db.close(); };
    req.onerror = () => reject(req.error);
  });
}
async function deletePoisByRegion(regionId) {
  const db = await openPoiDB();
  const tx = db.transaction('pois', 'readwrite');
  const idx = tx.objectStore('pois').index('regionId');
  const req = idx.openCursor(IDBKeyRange.only(regionId));
  await new Promise((res, rej) => {
    req.onsuccess = (e) => { const c = e.target.result; if (c) { c.delete(); c.continue(); } else res(); };
    req.onerror = () => rej(req.error);
  });
  db.close();
}

function lonLatToTile(lon, lat, z) {
  const n = 2 ** z;
  const x = Math.floor((lon + 180) / 360 * n);
  const latRad = lat * Math.PI / 180;
  const y = Math.floor((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n);
  return [Math.max(0, Math.min(n - 1, x)), Math.max(0, Math.min(n - 1, y))];
}

function estimateTiles(bbox, minZoom, maxZoom) {
  const [w, s, e, n] = bbox;
  let count = 0;
  for (let z = minZoom; z <= maxZoom; z++) {
    const [xMin, yMin] = lonLatToTile(w, n, z);
    const [xMax, yMax] = lonLatToTile(e, s, z);
    count += (Math.abs(xMax - xMin) + 1) * (Math.abs(yMax - yMin) + 1);
  }
  return count;
}

const AVG_TILE_BYTES = 15 * 1024;
const regionsKey = 'cc.regions.v1';
function loadRegions() { return JSON.parse(localStorage.getItem(regionsKey) || '[]'); }
function saveRegions(r) { localStorage.setItem(regionsKey, JSON.stringify(r)); }
function bboxCenter(b) { return [(b[0] + b[2]) / 2, (b[1] + b[3]) / 2]; }
function fmtCoord(lon, lat) {
  const ns = lat >= 0 ? 'N' : 'S', ew = lon >= 0 ? 'E' : 'W';
  return `${Math.abs(lat).toFixed(2)}°${ns}, ${Math.abs(lon).toFixed(2)}°${ew}`;
}
function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })
    + ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
}

(async () => {
  if (!('serviceWorker' in navigator)) {
    document.getElementById('status').textContent =
      'ServiceWorker unavailable — cannot run in offline-only mode on this browser.';
    return;
  }

  await navigator.serviceWorker.register('/sw.js');
  await navigator.serviceWorker.ready;

  const viewKey = 'cc.view.v1';
  const savedView = (() => {
    try { return JSON.parse(localStorage.getItem(viewKey) || 'null'); } catch { return null; }
  })();

  const map = new maplibregl.Map({
    container: 'map',
    center: savedView?.center || [0, 0],
    zoom: savedView?.zoom ?? 2,
    bearing: savedView?.bearing || 0,
    pitch: savedView?.pitch || 0,
    style: {
      version: 8,
      glyphs: location.origin + '/fonts/{fontstack}/{range}.pbf',
      sources: {
        local: { type: 'vector', tiles: [location.origin + '/tiles/{z}/{x}/{y}.pbf'], minzoom: 0, maxzoom: 14 }
      },
      layers: [
        { id: 'bg', type: 'background', paint: { 'background-color': '#f5f5dc' } },
        { id: 'landcover', type: 'fill', source: 'local', 'source-layer': 'landcover', paint: { 'fill-color': '#e6e6d6' } },
        { id: 'landuse', type: 'fill', source: 'local', 'source-layer': 'landuse', paint: { 'fill-color': '#e0e0d0' } },
        { id: 'water', type: 'fill', source: 'local', 'source-layer': 'water', paint: { 'fill-color': '#a0c8f0' } },
        { id: 'buildings', type: 'fill', source: 'local', 'source-layer': 'building', minzoom: 13, paint: { 'fill-color': '#d9d0c9' } },
        { id: 'roads', type: 'line', source: 'local', 'source-layer': 'transportation', paint: { 'line-color': '#ffffff', 'line-width': 1 } },
        { id: 'road-labels', type: 'symbol', source: 'local', 'source-layer': 'transportation_name',
          minzoom: 13,
          layout: { 'text-field': ['coalesce', ['get', 'name:latin'], ['get', 'name'], ['get', 'name_int']], 'text-font': ['KlokanTech Noto Sans Regular'],
                    'text-size': 11, 'symbol-placement': 'line' },
          paint: { 'text-color': '#555', 'text-halo-color': '#fff', 'text-halo-width': 1 } },
        { id: 'poi-dots', type: 'circle', source: 'local', 'source-layer': 'poi',
          minzoom: 14,
          paint: { 'circle-radius': 3, 'circle-color': '#d66',
                   'circle-stroke-color': '#fff', 'circle-stroke-width': 1 } },
        { id: 'poi-labels', type: 'symbol', source: 'local', 'source-layer': 'poi',
          minzoom: 15,
          layout: { 'text-field': ['coalesce', ['get', 'name:latin'], ['get', 'name'], ['get', 'name_int']], 'text-font': ['KlokanTech Noto Sans Regular'],
                    'text-size': 11, 'text-offset': [0, 0.9], 'text-anchor': 'top',
                    'text-optional': true },
          paint: { 'text-color': '#333', 'text-halo-color': '#fff', 'text-halo-width': 1.5 } },
        { id: 'places', type: 'symbol', source: 'local', 'source-layer': 'place',
          layout: { 'text-field': ['coalesce', ['get', 'name:latin'], ['get', 'name'], ['get', 'name_int']], 'text-font': ['KlokanTech Noto Sans Regular'],
                    'text-size': ['match', ['get', 'class'], 'city', 14, 'town', 12, 10] },
          paint: { 'text-color': '#333', 'text-halo-color': '#fff', 'text-halo-width': 1 } }
      ]
    },
  });
  map.addControl(new maplibregl.NavigationControl());

  map.on('moveend', () => {
    const c = map.getCenter();
    localStorage.setItem(viewKey, JSON.stringify({
      center: [c.lng, c.lat], zoom: map.getZoom(),
      bearing: map.getBearing(), pitch: map.getPitch()
    }));
  });
  map.addControl(new maplibregl.ScaleControl({ maxWidth: 120, unit: 'metric' }));

  const geolocate = new maplibregl.GeolocateControl({
    positionOptions: { enableHighAccuracy: true },
    trackUserLocation: true,
    showUserHeading: true,
    fitBoundsOptions: { maxZoom: 15 }
  });
  map.addControl(geolocate);

  map.on('load', () => {
    if (!savedView && localStorage.getItem('cc.geoPromptDone') !== '1') {
      geolocate.trigger();
      localStorage.setItem('cc.geoPromptDone', '1');
    }
  });

  geolocate.on('error', (e) => {
    const status = document.getElementById('status');
    if (status) status.textContent = 'location: ' + (e && e.message ? e.message : 'unavailable');
  });

  const esc = (s) => String(s).replace(/[&<>"']/g,
    c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  const humanize = (s) => String(s || '').replace(/_/g, ' ')
    .replace(/\b\w/g, c => c.toUpperCase());
  map.on('click', (e) => {
    const bbox = [[e.point.x - 8, e.point.y - 8], [e.point.x + 8, e.point.y + 8]];
    const hits = map.queryRenderedFeatures(bbox, { layers: ['poi-dots', 'poi-labels'] });
    if (!hits.length) return;
    const p = hits[0].properties;
    const realName = p['name:latin'] || p.name || p.name_int;
    const name = realName
      || humanize(p.subclass)
      || humanize(p.class)
      || '(unnamed)';
    const subParts = realName
      ? [p.class, p.subclass && p.subclass !== p.class ? p.subclass : null]
      : (p.subclass && p.class !== p.subclass ? [p.class] : []);
    const sub = subParts.filter(Boolean).map(humanize).join(' · ');
    new maplibregl.Popup({ closeButton: true, maxWidth: '240px' })
      .setLngLat(e.lngLat)
      .setHTML(`<strong>${esc(name)}</strong>${sub ? '<br><small>' + esc(sub) + '</small>' : ''}`)
      .addTo(map);
  });

  let allPois = await loadAllPois();

  async function backfillMissingPois() {
    const withPois = new Set(allPois.map(p => p.regionId));
    const missing = loadRegions().filter(r => !withPois.has(r.id));
    if (!missing.length) return;
    const status = document.getElementById('status');
    status.textContent = `indexing ${missing.length} region(s)…`;
    for (const r of missing) {
      const n = await fetchAndSavePois(r.id, r.bbox);
      const list = loadRegions();
      const hit = list.find(x => x.id === r.id);
      if (hit) { hit.poiCount = n; saveRegions(list); }
    }
    status.textContent = '';
    renderRegions();
  }
  const searchInput = document.getElementById('searchInput');
  const searchResults = document.getElementById('searchResults');
  let searchTimer = null;

  function renderSearch(q) {
    if (!q) { searchResults.classList.remove('show'); searchResults.innerHTML = ''; return; }
    const qLower = q.toLowerCase();
    const out = [];
    for (const p of allPois) {
      if (p.name && p.name.toLowerCase().includes(qLower)) {
        out.push(p);
        if (out.length >= 20) break;
      }
    }
    if (!out.length) {
      searchResults.innerHTML = '<div class="poi-result"><div class="name" style="color:#999">no matches in downloaded regions</div></div>';
    } else {
      searchResults.innerHTML = out.map((p, i) =>
        `<div class="poi-result" data-idx="${i}">
          <div class="name">${esc(p.name)}</div>
          ${p.category ? `<div class="cat">${esc(humanize(p.category))}</div>` : ''}
        </div>`).join('');
      searchResults.querySelectorAll('.poi-result').forEach((el, i) => {
        el.onclick = () => {
          const p = out[i];
          map.flyTo({ center: [p.lng, p.lat], zoom: Math.max(map.getZoom(), 16) });
          searchInput.value = '';
          searchResults.classList.remove('show');
          searchInput.blur();
        };
      });
    }
    searchResults.classList.add('show');
  }
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    const v = searchInput.value.trim();
    searchTimer = setTimeout(() => renderSearch(v), 120);
  });
  searchInput.addEventListener('focus', () => {
    if (searchInput.value.trim()) renderSearch(searchInput.value.trim());
  });
  document.addEventListener('click', (e) => {
    if (!document.getElementById('search').contains(e.target)) {
      searchResults.classList.remove('show');
    }
  });

  const currentBbox = () => {
    const b = map.getBounds();
    return [b.getWest(), b.getSouth(), b.getEast(), b.getNorth()];
  };

  const MIN_ZOOM = 1;
  function updateDownloadLabel() {
    const btn = document.getElementById('downloadBtn');
    const maxZoom = +document.getElementById('zMax').value;
    if (maxZoom < MIN_ZOOM) { btn.textContent = '↓ max zoom too low'; return; }
    const count = estimateTiles(currentBbox(), MIN_ZOOM, maxZoom);
    const mb = (count * AVG_TILE_BYTES / 1048576).toFixed(1);
    btn.textContent = `↓ save current view (${count.toLocaleString()} tiles, ~${mb} MB)`;
  }
  map.on('moveend', updateDownloadLabel);
  map.on('zoomend', updateDownloadLabel);
  document.getElementById('zMax').addEventListener('input', updateDownloadLabel);
  map.on('load', updateDownloadLabel);

  function renderPoiStat() {
    document.getElementById('poiStat').textContent =
      `${allPois.length.toLocaleString()} POIs indexed`;
  }

  function renderRegions() {
    const list = loadRegions();
    document.getElementById('offlineBadge').textContent = list.length ? `(${list.length})` : '';
    const el = document.getElementById('regions');
    el.innerHTML = '';
    for (const r of list) {
      const [clon, clat] = bboxCenter(r.bbox);
      const when = r.createdAt ? fmtDate(r.createdAt) : '';
      const row = document.createElement('div');
      row.className = 'region';
      row.innerHTML = `<div><div class="label">${fmtCoord(clon, clat)}</div>
        <div class="meta">${when} · z${r.minZoom}–${r.maxZoom} · ${r.tileCount} tiles</div></div>
        <div><button data-goto="${r.id}">go</button>
        <button data-del="${r.id}">×</button></div>`;
      el.appendChild(row);
    }
    el.querySelectorAll('[data-goto]').forEach(b => b.onclick = () => {
      const r = loadRegions().find(x => x.id === b.dataset.goto);
      if (r) map.fitBounds([[r.bbox[0], r.bbox[1]], [r.bbox[2], r.bbox[3]]]);
    });
    el.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
      const id = b.dataset.del;
      const list = loadRegions();
      const r = list.find(x => x.id === id);
      if (!r) return;
      if (!confirm('delete this map?')) return;
      const reg = await navigator.serviceWorker.ready;
      reg.active.postMessage({ type: 'deleteTiles', urls: r.urls });
      await deletePoisByRegion(id);
      allPois = allPois.filter(p => p.regionId !== id);
      saveRegions(list.filter(x => x.id !== id));
      renderRegions();
      renderPoiStat();
      updateStorageInfo();
    });
  }
  renderRegions();
  renderPoiStat();
  backfillMissingPois();

  async function getFontUrls() {
    const fontstack = 'KlokanTech Noto Sans Regular';
    try {
      const res = await fetch(`/fontslist/${encodeURIComponent(fontstack)}`);
      if (!res.ok) return [];
      const { files } = await res.json();
      return files.map(f => `/fonts/${encodeURIComponent(fontstack)}/${f}`);
    } catch { return []; }
  }

  async function fetchAndSavePois(regionId, bbox) {
    try {
      const pres = await fetch(`/poi?bbox=${bbox.join(',')}`,
        { headers: { 'X-Download': '1' } });
      if (!pres.ok) return 0;
      const { pois = [] } = await pres.json();
      if (!pois.length) return 0;
      await savePois(regionId, pois);
      allPois = allPois.concat(pois.map(p => ({ ...p, regionId })));
      renderPoiStat();
      return pois.length;
    } catch (err) {
      console.error('POI fetch failed:', err);
      return 0;
    }
  }

  document.getElementById('downloadBtn').onclick = async () => {
    const maxZoom = +document.getElementById('zMax').value;
    if (maxZoom < MIN_ZOOM) return;
    const minZoom = MIN_ZOOM;
    const bbox = currentBbox();
    const id = crypto.randomUUID();
    const status = document.getElementById('status');
    status.textContent = 'preparing…';
    const extraUrls = await getFontUrls();
    const poiCount = await fetchAndSavePois(id, bbox);
    const reg = await navigator.serviceWorker.ready;
    const onMsg = (e) => {
      if (e.data.id !== id) return;
      if (e.data.type === 'progress') {
        status.textContent = `downloading ${e.data.done}/${e.data.total}${e.data.failed ? ` (${e.data.failed} failed)` : ''}`;
      } else if (e.data.type === 'done') {
        status.textContent = `saved ${e.data.done - e.data.failed} tiles, ${poiCount} POIs (${e.data.failed} failed)`;
        const list = loadRegions();
        list.push({
          id, createdAt: Date.now(), bbox, minZoom, maxZoom,
          tileCount: e.data.done - e.data.failed, urls: e.data.urls,
          poiCount
        });
        saveRegions(list);
        renderRegions();
        requestPersistent();
        const src = map.getSource('local');
        if (src && src.setTiles) src.setTiles([location.origin + '/tiles/{z}/{x}/{y}.pbf']);
        navigator.serviceWorker.removeEventListener('message', onMsg);
      }
    };
    navigator.serviceWorker.addEventListener('message', onMsg);
    reg.active.postMessage({ type: 'download', bbox, minZoom, maxZoom, id, extraUrls });
  };
})();
</script>
</body>
</html>
